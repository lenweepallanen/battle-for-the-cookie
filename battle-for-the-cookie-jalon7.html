<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle for the Cookie — MVP (Jalon 7)</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #6f8a4f; }
  canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<script>
// ============================================================
// BATTLE FOR THE COOKIE — JALON 4 : LA ZONE
// - Cercle rouge qui se resserre à chaque manche (avec l'indice)
// - Dégâts hors zone, croissants à chaque phase
// - Les PNJ hors zone migrent vers le centre → densité qui monte
// - PV joueur + barre de vie + écran de défaite + minimap
// ============================================================

const WORLD = 2200;
const CENTER = WORLD / 2;
const PLAYER_SPEED = 230;
const PLAYER_MAX_HP = 100;
const BULLET_SPEED = 750;
const FIRE_COOLDOWN = 150;
const BULLET_LIFE = 900;
const NPC_COUNT = 120;
const NPC_HP = 20; // en points de dégâts désormais (fusil 12 → 2 balles, roquette → one-shot)

// --- Arsenal (Jalon 6) ---
const WEAPONS = {
  pistol:  { name: 'Pistolet', key: '1', dmg: 12, cd: 400,  speed: 700, life: 900,  pellets: 1, spread: 0.03, infinite: true },
  rifle:   { name: 'Fusil',    key: '2', dmg: 12, cd: 150,  speed: 750, life: 900,  pellets: 1, spread: 0.05 },
  shotgun: { name: 'Pompe',    key: '3', dmg: 8,  cd: 900,  speed: 650, life: 380,  pellets: 5, spread: 0.45 },
  rocket:  { name: 'Roquette', key: '4', dmg: 60, cd: 1200, speed: 420, life: 1600, pellets: 1, spread: 0, explosive: true, radius: 90 }
};
const AMMO_PACK = { rifle: 30, shotgun: 12, rocket: 1 };
const MEDKIT_HEAL = 50;
const MEDKIT_MAX = 3;
const HEAL_TIME = 2000;        // canalisation du soin (R maintenu implicite : 2 s)
const LOOT_COUNTS = { rifle: 8, shotgun: 6, rocket: 4, medkit: 8 };
const CLUE_INTERVAL = 30000;
const MAX_ROUNDS = 4;          // 4 manches : 4 indices, 4 resserrements, puis phase finale
const SCORE_GOOD = 10;
// Malus progressif : indexé sur le nombre d'indices déjà révélés (0 à 4).
// Courbe adoucie : l'erreur pique un peu plus à chaque manche sans être écrasante.
const MALUS_TABLE = [-10, -10, -15, -20, -25];
const SCORE_CULPRIT = 500;     // capture du coupable : le jackpot qui met fin à la partie
const SCORE_WRONG_TIE = -100;  // ligotage complet sur le mauvais suspect (joueur ET bots)
const SCORE_COOKIE_LOST = -500; // amende pour celui qui tue le DERNIER suspect (mystère détruit)
const BOT_TIE_ERROR = 0.25;    // 25% du temps, un bot "lit mal" et cible un PNJ déjà exclu
const BOT_PURGE_HIT = 0.8;     // purge : 80% de touche par balle (viser un PNJ, c'est facile)
const BOT_PURGE_MISTAKE = 0.18;// ... mais 18% du temps la rafale touche le voisin
const BOT_TARGET_ERROR = 0.15; // et 15% du temps, le bot IDENTIFIE MAL et purge un suspect (malus)
const BOT_PURGE_CD = 320;      // cadence de purge (plus rapide que le combat)

// --- Capture du coupable (phase finale) ---
const WHIP_RANGE = 200;        // portée du fouet
const WHIP_COOLDOWN = 600;     // ms entre deux coups de fouet ratés
const CAPTURE_TIME = 10000;    // 10 s de ligotage, clic maintenu

// --- Bots (faux joueurs) ---
const BOT_HP = 60;
const BOT_SPEED = 200;
const BOT_VIEW = 380;            // distance de détection du joueur
const BOT_FIRE_CD = 450;         // cadence de tir des bots
const BOT_BULLET_SPEED = 620;
const BOT_BULLET_DMG = 10;       // dégâts d'une balle de bot sur le joueur
const PLAYER_BULLET_DMG = 12;    // dégâts d'une balle du joueur sur un bot (5 tirs)
const RESPAWN_MS = 30000;        // down de 30 s, pour le joueur comme pour les bots
const SCORE_BOT = 50;            // down d'un joueur/bot : le PvP paie
const BOT_DEFS = [
  { name: 'Detective72',  color: '#6ea8ff', hex: 0x6ea8ff, hair: 0x8a5a2b },
  { name: 'CookieHunter', color: '#c79bff', hex: 0xc79bff, hair: 0xe8c86e },
  { name: 'ClueMaster',   color: '#ff8a7a', hex: 0xff8a7a, hair: 0x2e2620 }
];

// --- Zone ---
const ZONE_START_R = 1560;       // couvre toute la map au départ
const ZONE_SHRINK_FACTOR = 0.7;  // rayon suivant = rayon x 0.7
const ZONE_MIN_R = 220;
const ZONE_SHRINK_MS = 10000;    // durée de la rétraction

const HAIR_COLORS = { roux: 0xc96f3b, blond: 0xe8c86e, noir: 0x2e2620 };
const HAIR_LENGTHS = ['long', 'court'];
const HATS = ['chapeau', 'rien'];
const TOP_COLORS = { rouge: 0xc75b4a, bleu: 0x5b7fb5, vert: 0x6a9a5b };
const SKIN = 0xf6d7b0;

const CLUE_TEXTS = {
  hair:  (v) => `Le coupable n'a pas les cheveux ${v} !`,
  len:   (v) => `Le coupable n'a pas les cheveux ${v}s !`,
  hat:   (v) => v === 'chapeau' ? `Le coupable ne porte pas de chapeau !` : `Le coupable porte un chapeau !`,
  top:   (v) => `Le coupable ne porte pas de haut ${v} !`
};

class MainScene extends Phaser.Scene {

  makeBaseTextures() {
    const g = this.make.graphics({ add: false });
    g.fillStyle(0x4a3b2a); g.fillCircle(17, 17, 17);
    g.fillStyle(0xf6e7c9); g.fillCircle(17, 17, 15);
    g.generateTexture('player', 34, 34); g.clear();
    g.fillStyle(0x2e2620); g.fillCircle(12, 12, 12);
    g.generateTexture('hair_player', 24, 24); g.clear();
    // Version blanche, teintable, pour les cheveux des bots
    g.fillStyle(0xffffff); g.fillCircle(12, 12, 12);
    g.generateTexture('hair_white', 24, 24); g.clear();
    g.fillStyle(0x3a332b); g.fillRoundedRect(0, 0, 30, 9, 3);
    g.fillStyle(0x57493a); g.fillRoundedRect(0, 2, 22, 5, 2);
    g.generateTexture('gun', 30, 9); g.clear();
    g.fillStyle(0xffe08a); g.fillCircle(5, 5, 5);
    g.fillStyle(0xfff6d8); g.fillCircle(5, 5, 3);
    g.generateTexture('bullet', 10, 10); g.clear();
    g.fillStyle(0x51683c); g.fillCircle(34, 34, 34);
    g.fillStyle(0x5f7a45); g.fillCircle(28, 28, 24);
    g.fillStyle(0x6d8a50); g.fillCircle(40, 26, 14);
    g.generateTexture('bush', 68, 68); g.clear();
    g.fillStyle(0xfff2b0); g.fillCircle(8, 8, 8);
    g.generateTexture('flash', 16, 16); g.clear();
    g.fillStyle(0xe9dfc8); g.fillCircle(6, 6, 6);
    g.generateTexture('puff', 12, 12); g.clear();
    // Poignée de fouet (manche + rouleau de corde)
    g.fillStyle(0x5c4326); g.fillRoundedRect(0, 3, 16, 7, 3);
    g.fillStyle(0x8a5a2b); g.fillCircle(20, 6, 6);
    g.fillStyle(0x5c4326); g.fillCircle(20, 6, 3);
    g.generateTexture('whip_handle', 27, 13); g.clear();

    // Armes en main
    g.fillStyle(0x3a332b); g.fillRoundedRect(0, 1, 18, 8, 3);
    g.fillStyle(0x57493a); g.fillRoundedRect(0, 3, 13, 4, 2);
    g.generateTexture('gun_pistol', 18, 10); g.clear();
    g.fillStyle(0x3a332b); g.fillRoundedRect(0, 0, 32, 10, 3);
    g.fillStyle(0x6b4a2a); g.fillRoundedRect(6, 6, 8, 6, 2);
    g.fillStyle(0x57493a); g.fillRoundedRect(0, 2, 24, 5, 2);
    g.generateTexture('gun_shotgun', 32, 12); g.clear();
    g.fillStyle(0x4a5340); g.fillRoundedRect(0, 0, 34, 12, 5);
    g.fillStyle(0x2c2620); g.fillCircle(32, 6, 6);
    g.generateTexture('gun_rocket', 38, 12); g.clear();

    // Icônes de loot (caisses au sol + hotbar) — silhouettes différenciées
    const icon = (key, draw) => {
      g.fillStyle(0xf3ead8); g.fillRoundedRect(0, 0, 34, 34, 8);
      g.lineStyle(2, 0x4a3b2a, 1); g.strokeRoundedRect(1, 1, 32, 32, 8);
      draw();
      g.generateTexture(key, 34, 34); g.clear();
    };
    icon('loot_pistol', () => {
      // Compact : culasse courte + crosse inclinée
      g.fillStyle(0x2f2a24); g.fillRoundedRect(8, 12, 18, 6, 2);
      g.fillStyle(0x4a4038); g.fillRoundedRect(9, 13, 12, 2, 1);
      g.fillStyle(0x2f2a24); g.fillRoundedRect(11, 17, 6, 9, 2);
      g.fillStyle(0x6b4a2a); g.fillRoundedRect(12, 19, 4, 6, 1);
    });
    icon('loot_rifle', () => {
      // Long et anguleux : canon fin, crosse, chargeur courbe, viseur
      g.fillStyle(0x2f2a24);
      g.fillRect(4, 14, 27, 3);                 // canon
      g.fillRoundedRect(9, 12, 12, 7, 2);       // corps
      g.fillRect(26, 10, 2, 4);                 // viseur avant
      g.fillRoundedRect(3, 12, 5, 6, 2);        // crosse
      g.fillRoundedRect(11, 19, 4, 6, 1);       // poignée
      g.fillStyle(0x4a5340);
      g.fillRoundedRect(16, 19, 6, 8, 2);       // chargeur (accent vert-de-gris)
    });
    icon('loot_shotgun', () => {
      // Trapu, bois dominant : gros canon, pompe et crosse brunes
      g.fillStyle(0x6b4a2a); g.fillRoundedRect(2, 11, 9, 9, 3);   // crosse bois
      g.fillStyle(0x2f2a24); g.fillRect(9, 12, 22, 5);            // canon épais
      g.fillStyle(0x8a5a2b); g.fillRoundedRect(14, 18, 10, 6, 2); // pompe bois
      g.fillStyle(0x4a4038); g.fillRect(28, 13, 3, 3);            // bouche
    });
    icon('loot_rocket', () => {
      // Le projectile façon mockup : ogive rouge, corps crème, ailerons, flamme
      g.fillStyle(0xe8834a); g.fillCircle(6, 17, 3);              // flamme
      g.fillStyle(0xffe08a); g.fillCircle(8, 17, 2);
      g.fillStyle(0xc75b4a);
      g.fillTriangle(10, 12, 10, 22, 5, 17);                      // ailerons
      g.fillStyle(0xe9dfc8); g.fillRoundedRect(9, 13, 14, 8, 4);  // corps
      g.fillStyle(0xc75b4a);
      g.fillRect(13, 13, 3, 8);                                   // bande rouge
      g.fillTriangle(22, 12, 22, 22, 30, 17);                     // ogive
    });
    icon('loot_medkit', () => {
      g.fillStyle(0xc75b4a);
      g.fillRect(14, 8, 6, 18); g.fillRect(8, 14, 18, 6);
    });

    // Sang : goutte (projetée au tir) + flaque irrégulière (persistante)
    g.fillStyle(0x9c2f24); g.fillCircle(4, 4, 4);
    g.generateTexture('blood_drop', 8, 8); g.clear();
    g.fillStyle(0x8e2a20);
    g.fillEllipse(24, 22, 34, 22);
    g.fillCircle(12, 26, 9); g.fillCircle(36, 18, 8); g.fillCircle(30, 30, 7);
    g.fillStyle(0x7a221a); g.fillEllipse(24, 22, 20, 12);
    g.generateTexture('blood_pool', 48, 44);
    g.destroy();
  }

  makeNpcTextures() {
    for (const hair of Object.keys(HAIR_COLORS)) {
      for (const len of HAIR_LENGTHS) {
        for (const hat of HATS) {
          for (const top of Object.keys(TOP_COLORS)) {
            const g = this.make.graphics({ add: false });
            const hc = HAIR_COLORS[hair];
            const tc = TOP_COLORS[top];
            if (len === 'long') { g.fillStyle(hc); g.fillRoundedRect(7, 10, 22, 30, 10); }
            g.fillStyle(tc); g.fillRoundedRect(10, 27, 16, 18, 6);
            g.fillStyle(SKIN); g.fillCircle(18, 18, 10);
            g.fillStyle(hc); g.fillCircle(18, 15, 10);
            g.fillStyle(SKIN); g.fillCircle(18, 20, 9);
            g.fillStyle(0x3a2f24);
            g.fillCircle(14.5, 19, 1.4); g.fillCircle(21.5, 19, 1.4);
            g.fillRect(16, 23, 4, 1.2);
            if (hat === 'chapeau') {
              g.fillStyle(0x8a6a44);
              g.fillEllipse(18, 12, 26, 8);
              g.fillRoundedRect(11, 3, 14, 11, 4);
              g.fillStyle(0x6f5435); g.fillRect(11, 10, 14, 3);
            }
            g.generateTexture(`npc_${hair}_${len}_${hat}_${top}`, 36, 48);
            g.destroy();
          }
        }
      }
    }
  }

  drawGround() {
    const g = this.add.graphics();
    g.fillStyle(0x8ba05e); g.fillRect(0, 0, WORLD, WORLD);
    g.lineStyle(90, 0xc9b183, 1);
    g.beginPath(); g.moveTo(0, WORLD * 0.45); g.lineTo(WORLD, WORLD * 0.62); g.strokePath();
    g.beginPath(); g.moveTo(WORLD * 0.55, 0); g.lineTo(WORLD * 0.42, WORLD); g.strokePath();
    g.fillStyle(0xc9b183); g.fillCircle(CENTER, CENTER, 160);
    g.fillStyle(0x9db06c); g.fillCircle(CENTER, CENTER, 120);
    let seed = 42;
    const rnd = () => { seed = (seed * 16807) % 2147483647; return seed / 2147483647; };
    for (let i = 0; i < 700; i++) {
      const x = rnd() * WORLD, y = rnd() * WORLD, r = rnd();
      if (r < 0.85) { g.fillStyle(0x7e9455, 0.9); g.fillCircle(x, y, 3 + rnd() * 4); }
      else if (r < 0.95) { g.fillStyle(0xf3ead8, 0.9); g.fillCircle(x, y, 3); }
      else { g.fillStyle(0xe8b4c8, 0.9); g.fillCircle(x, y, 3); }
    }
    g.lineStyle(8, 0x51683c, 0.6); g.strokeRect(4, 4, WORLD - 8, WORLD - 8);
    g.setDepth(-10);
  }

  create() {
    this.makeBaseTextures();
    this.makeNpcTextures();
    this.physics.world.setBounds(0, 0, WORLD, WORLD);
    this.drawGround();

    this.gameOver = false;

    // ---------- OBSTACLES ----------
    this.bushes = this.physics.add.staticGroup();
    let seed = 7;
    const rnd = () => { seed = (seed * 16807) % 2147483647; return seed / 2147483647; };
    for (let i = 0; i < 22; i++) {
      const x = 150 + rnd() * (WORLD - 300);
      const y = 150 + rnd() * (WORLD - 300);
      if (Phaser.Math.Distance.Between(x, y, CENTER, CENTER) < 260) continue;
      const b = this.bushes.create(x, y, 'bush');
      const s = 0.8 + rnd() * 0.9;
      b.setScale(s).refreshBody();
      b.body.setCircle(28 * s);
      b.body.setOffset(34 * s - 28 * s, 34 * s - 28 * s);
      b.setDepth(b.y);
    }

    // ---------- SPAWNS EN ANNEAU ----------
    // Joueur + bots naissent équidistants sur un anneau à ~65% du rayon :
    // personne ne démarre sur le loot central, chacun a son quartier.
    const totalSpawns = 1 + BOT_DEFS.length;
    const baseAngle = Math.random() * Math.PI * 2;
    this.spawnPoints = [];
    for (let i = 0; i < totalSpawns; i++) {
      const a = baseAngle + (i * Math.PI * 2) / totalSpawns + (Math.random() - 0.5) * 0.4;
      const r = ZONE_START_R * (0.58 + Math.random() * 0.12);
      this.spawnPoints.push({
        x: Phaser.Math.Clamp(CENTER + Math.cos(a) * r, 120, WORLD - 120),
        y: Phaser.Math.Clamp(CENTER + Math.sin(a) * r, 120, WORLD - 120)
      });
    }

    // ---------- JOUEUR ----------
    this.player = this.physics.add.sprite(this.spawnPoints[0].x, this.spawnPoints[0].y, 'player');
    this.player.setCircle(15, 2, 2);
    this.player.setCollideWorldBounds(true);
    this.player.hp = PLAYER_MAX_HP;
    this.hair = this.add.image(this.player.x, this.player.y - 4, 'hair_player');
    this.gun = this.add.image(this.player.x, this.player.y, 'gun_pistol').setOrigin(0.1, 0.5);
    this.tag = this.add.text(0, 0, 'YOU', {
      fontFamily: 'Arial Black, sans-serif', fontSize: '13px',
      color: '#7dd94a', stroke: '#2c3a1e', strokeThickness: 4
    }).setOrigin(0.5);
    this.physics.add.collider(this.player, this.bushes);

    // ---------- PNJ ----------
    this.npcs = this.physics.add.group();
    this.npcAlive = 0;
    for (let i = 0; i < NPC_COUNT; i++) this.spawnNpc(rnd);
    this.physics.add.collider(this.npcs, this.bushes);
    this.physics.add.collider(this.npcs, this.player);

    // ---------- LE COUPABLE ----------
    const all = this.npcs.getChildren();
    const culpritNpc = all[Math.floor(Math.random() * all.length)];
    culpritNpc.isCulprit = true;
    this.culpritAttrs = culpritNpc.attrs;

    this.cluePool = [];
    for (const v of Object.keys(HAIR_COLORS)) if (v !== this.culpritAttrs.hair) this.cluePool.push({ axis: 'hair', value: v });
    for (const v of HAIR_LENGTHS) if (v !== this.culpritAttrs.len) this.cluePool.push({ axis: 'len', value: v });
    for (const v of HATS) if (v !== this.culpritAttrs.hat) this.cluePool.push({ axis: 'hat', value: v });
    for (const v of Object.keys(TOP_COLORS)) if (v !== this.culpritAttrs.top) this.cluePool.push({ axis: 'top', value: v });
    Phaser.Utils.Array.Shuffle(this.cluePool);
    this.cluePool = this.cluePool.slice(0, MAX_ROUNDS); // 4 indices sur les 6 possibles
    this.revealedClues = [];

    // ---------- BALLES ----------
    this.bullets = this.physics.add.group({ defaultKey: 'bullet', maxSize: 60 });
    this.physics.add.collider(this.bullets, this.bushes, (b) => {
      if (b.explosive) { const bx = b.x, by = b.y; this.killBullet(b); this.explodeAt(bx, by); }
      else this.killBullet(b);
    });
    this.physics.add.overlap(this.bullets, this.npcs, (bullet, npc) => this.hitNpc(bullet, npc));

    // ---------- BOTS (faux joueurs) ----------
    this.botGroup = this.physics.add.group();
    this.bots = [];
    for (const def of BOT_DEFS) this.spawnBot(def);
    this.physics.add.collider(this.botGroup, this.bushes);
    this.physics.add.collider(this.botGroup, this.player);
    this.botGfx = this.add.graphics().setDepth(9550);

    // Balles du joueur → bots
    this.physics.add.overlap(this.bullets, this.botGroup, (bullet, botSprite) => {
      if (bullet.explosive) {
        const bx = bullet.x, by = bullet.y;
        this.killBullet(bullet);
        this.explodeAt(bx, by);
        return;
      }
      const dmg = bullet.dmg || 12;
      this.killBullet(bullet);
      this.damageBot(botSprite.botRef, dmg, true);
    });

    // ---------- BALLES ENNEMIES ----------
    this.enemyBullets = this.physics.add.group({ defaultKey: 'bullet', maxSize: 80 });
    this.physics.add.collider(this.enemyBullets, this.bushes, (b) => this.killBullet(b));
    // ATTENTION piège Phaser : dans overlap(sprite, groupe) le callback reçoit
    // TOUJOURS (sprite, membreDuGroupe), quel que soit l'ordre des arguments.
    // Inverser les noms ici avait désactivé le corps du joueur au premier impact.
    this.physics.add.overlap(this.player, this.enemyBullets, (playerObj, bullet) => {
      const owner = bullet.owner;
      const cosmetic = bullet.cosmetic;
      this.killBullet(bullet);
      if (cosmetic) return; // balle de purge : dégâts déjà résolus aux dés
      if (!this.playerDown) {
        this.player.setTintFill(0xffffff);
        this.time.delayedCall(60, () => this.player.clearTint());
        this.damagePlayer(BOT_BULLET_DMG, owner);
      }
    });
    this.physics.add.overlap(this.enemyBullets, this.npcs, (bullet, npc) => this.hitNpcByBot(bullet, npc));

    // ---------- LA ZONE ----------
    this.zoneR = ZONE_START_R;        // rayon actuel
    this.zoneFrom = ZONE_START_R;     // rayon au début de la rétraction
    this.zoneTo = ZONE_START_R;       // rayon cible
    this.zoneShrinkStart = 0;         // horodatage du début de rétraction
    this.zonePhase = 0;               // numéro de phase (pour les dégâts)
    this.zoneGfx = this.add.graphics().setDepth(8000);
    this.zoneDamageAcc = 0;           // accumulateur de dégâts

    // Vignette rouge de dégâts (plein écran, invisible par défaut)
    this.dmgVignette = this.add.rectangle(0, 0, 10, 10, 0xe04a3a, 0)
      .setOrigin(0).setScrollFactor(0).setDepth(15000);

    // ---------- DOWN / RESPAWN DU JOUEUR ----------
    this.playerDown = false;
    this.playerRespawnAt = 0;
    this.downOverlay = this.add.rectangle(0, 0, 10, 10, 0x2c3a1e, 0)
      .setOrigin(0).setScrollFactor(0).setDepth(15001);
    this.downText = this.add.text(0, 0, '', {
      fontFamily: 'Arial Black, sans-serif', fontSize: '34px', color: '#f3ead8',
      stroke: '#2c3a1e', strokeThickness: 8, align: 'center'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(15002).setVisible(false);

    // ---------- INVENTAIRE & LOOT ----------
    this.owned = { pistol: true, rifle: false, shotgun: false, rocket: false };
    this.ammo = { rifle: 0, shotgun: 0, rocket: 0 };
    this.medkits = 0;
    this.currentWeapon = 'pistol';
    this.healing = null; // { until } pendant la canalisation du soin

    this.loot = this.physics.add.group();
    this.spawnInitialLoot();
    this.physics.add.overlap(this.player, this.loot, (playerObj, item) => this.pickupLoot(item));
    this.physics.add.overlap(this.botGroup, this.loot, (botSprite, item) => {
      // Les bots se soignent sur les medkits qu'ils croisent
      const bot = botSprite.botRef;
      if (item.lootType === 'medkit' && bot && !bot.down && bot.hp < BOT_HP * 0.75) {
        bot.hp = Math.min(BOT_HP, bot.hp + MEDKIT_HEAL);
        item.destroy();
      }
    });

    this.weaponKeys = this.input.keyboard.addKeys('ONE,TWO,THREE,FOUR,R');
    this.input.on('wheel', (pointer, objs, dx, dy) => {
      if (this.gameOver || this.playerDown || this.tying) return;
      const order = ['pistol', 'rifle', 'shotgun', 'rocket'].filter(w => this.owned[w]);
      let i = order.indexOf(this.currentWeapon);
      i = (i + (dy > 0 ? 1 : -1) + order.length) % order.length;
      this.selectWeapon(order[i]);
    });

    // Hotbar (bas centre, style mockup)
    this.hotbarGfx = this.add.graphics().setScrollFactor(0).setDepth(10000);
    this.hotbarTexts = [];
    for (let i = 0; i < 10; i++) {
      this.hotbarTexts.push(this.add.text(0, 0, '', {
        fontFamily: 'Arial Black, sans-serif', fontSize: '12px', color: '#4a3b2a'
      }).setScrollFactor(0).setDepth(10001));
    }
    this.hotbarIcons = [];

    // Bascule titre / partie (le titre ne s'affiche qu'à la première partie)
    this.titleMode = !this.registry.get('skipTitle');

    // ---------- CAMÉRA & CONTRÔLES ----------
    this.cameras.main.setBounds(0, 0, WORLD, WORLD);
    this.cameras.main.startFollow(this.player, true, 0.12, 0.12);
    this.keys = this.input.keyboard.addKeys('Z,Q,S,D,W,A,UP,LEFT,DOWN,RIGHT,E');
    this.lastShot = 0;

    // ---------- HUD ----------
    this.score = 0;
    this.kills = 0;

    this.hudStats = this.add.text(16, 14, '', {
      fontFamily: 'Arial Black, sans-serif', fontSize: '17px', color: '#f3ead8',
      backgroundColor: '#4a3b2a', padding: { x: 12, y: 8 }, lineSpacing: 4
    }).setScrollFactor(0).setDepth(10000).setAlpha(0.95);

    this.hudClues = this.add.text(16, 132, 'INDICES\n(aucun pour l\'instant)', {
      fontFamily: 'Arial, sans-serif', fontSize: '14px', color: '#4a3b2a',
      backgroundColor: '#f3ead8', padding: { x: 10, y: 8 }, lineSpacing: 5
    }).setScrollFactor(0).setDepth(10000).setAlpha(0.92);

    // Barre de vie (bas gauche, style mockup)
    this.hpGfx = this.add.graphics().setScrollFactor(0).setDepth(10000);
    this.hpText = this.add.text(0, 0, '', {
      fontFamily: 'Arial Black, sans-serif', fontSize: '13px', color: '#2c3a1e'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(10001);

    // Minimap (haut droite, style mockup)
    this.minimapGfx = this.add.graphics().setScrollFactor(0).setDepth(10000);

    // ---------- LEADERBOARD (temps réel, sous la minimap) ----------
    this.lbGfx = this.add.graphics().setScrollFactor(0).setDepth(10000);
    this.lbTitle = this.add.text(0, 0, 'CLASSEMENT', {
      fontFamily: 'Arial Black, sans-serif', fontSize: '13px', color: '#f3ead8'
    }).setScrollFactor(0).setDepth(10001);
    this.lbLines = [];
    for (let i = 0; i < 4; i++) {
      this.lbLines.push(this.add.text(0, 0, '', {
        fontFamily: 'Arial Black, sans-serif', fontSize: '13px', color: '#f3ead8',
        stroke: '#2c3a1e', strokeThickness: 3
      }).setScrollFactor(0).setDepth(10001));
    }

    // Bannière indice
    this.banner = this.add.container(0, -80).setScrollFactor(0).setDepth(10001);
    this.bannerBg = this.add.rectangle(0, 0, 520, 74, 0xf3ead8).setStrokeStyle(3, 0x4a3b2a);
    this.bannerTitle = this.add.text(0, -16, 'NOUVEL INDICE !', {
      fontFamily: 'Arial Black, sans-serif', fontSize: '20px', color: '#4a3b2a'
    }).setOrigin(0.5);
    this.bannerText = this.add.text(0, 14, '', {
      fontFamily: 'Arial, sans-serif', fontSize: '17px', color: '#b3402e', fontStyle: 'bold'
    }).setOrigin(0.5);
    this.banner.add([this.bannerBg, this.bannerTitle, this.bannerText]);

    // ---------- CAPTURE (phase finale) ----------
    this.finalPhase = false;
    this.tying = null;              // { npc, progress } pendant un ligotage
    this.whipArmed = false;         // E : armer / ranger le fouet
    this.whipCooldownUntil = 0;     // anti-spam de coups ratés
    this.whipAnim = null;           // { start, angle, hit } animation du lash
    this.captureGfx = this.add.graphics().setDepth(9600);
    this.capturePrompt = this.add.text(0, 0, '', {
      fontFamily: 'Arial Black, sans-serif', fontSize: '14px',
      color: '#ffe08a', stroke: '#2c3a1e', strokeThickness: 4
    }).setOrigin(0.5).setDepth(9601).setVisible(false);

    this.nextClueAt = this.time.now + CLUE_INTERVAL;
    this.updateHud();

    // Traînées de balles (redessinées chaque frame)
    this.trailGfx = this.add.graphics().setDepth(8990);

    if (this.titleMode) this.showTitle();
    else this.startGame();
  }

  spawnNpc(rnd) {
    const pick = (arr) => arr[Math.floor(rnd() * arr.length)];
    const attrs = {
      hair: pick(Object.keys(HAIR_COLORS)),
      len: pick(HAIR_LENGTHS),
      hat: pick(HATS),
      top: pick(Object.keys(TOP_COLORS))
    };
    let x, y, tries = 0;
    do {
      x = 100 + rnd() * (WORLD - 200);
      y = 100 + rnd() * (WORLD - 200);
      tries++;
    } while (Phaser.Math.Distance.Between(x, y, CENTER, CENTER) < 220 && tries < 20);

    const npc = this.npcs.create(x, y, `npc_${attrs.hair}_${attrs.len}_${attrs.hat}_${attrs.top}`);
    npc.attrs = attrs;
    npc.hp = NPC_HP;
    npc.isCulprit = false;
    npc.setCircle(12, 6, 22);
    npc.setCollideWorldBounds(true);
    npc.setBounce(0.4);
    npc.nextThink = 0;
    this.npcAlive++;
    return npc;
  }

  isExcluded(npc) {
    return this.revealedClues.some(c => npc.attrs[c.axis] === c.value);
  }

  // Malus courant, selon l'avancement des manches
  currentMalus() {
    const i = Math.min(this.revealedClues.length, MALUS_TABLE.length - 1);
    return MALUS_TABLE[i];
  }

  // ---------- PHASE FINALE : LA CAPTURE ----------
  showFinalBanner() {
    if (this.gameOver) return;
    this.bannerTitle.setText('PHASE FINALE !');
    this.bannerText.setText('Capturez le coupable VIVANT — [E] arme le fouet, clic maintenu pour ligoter');
    this.banner.setPosition(this.cameras.main.width / 2, -80);
    this.tweens.add({ targets: this.banner, y: 70, duration: 400, ease: 'Back.easeOut' });
    this.time.delayedCall(7000, () => {
      this.tweens.add({ targets: this.banner, y: -80, duration: 300, ease: 'Back.easeIn' });
    });
  }

  updateCapture(time, delta) {
    this.captureGfx.clear();
    if (!this.finalPhase || this.gameOver) return;
    if (this.playerDown) { this.capturePrompt.setVisible(false); return; }

    const pointer = this.input.activePointer;

    // --- E : armer / ranger le fouet ---
    if (Phaser.Input.Keyboard.JustDown(this.keys.E) && !this.tying) {
      this.whipArmed = !this.whipArmed;
      this.gun.setTexture(this.whipArmed ? 'whip_handle' : this.weaponGunTexture(this.currentWeapon));
    }

    // --- Ligotage en cours : le clic maintenu EST le channel ---
    if (this.tying) {
      const npc = this.tying.npc;
      if (!pointer.isDown || !npc.active) { this.cancelTying(); return; }

      npc.setVelocity(0, 0);
      this.tying.progress += delta;

      // La corde entre le joueur et le suspect (léger frémissement)
      const wob = Math.sin(time / 60) * 2;
      this.captureGfx.lineStyle(3, 0x8a5a2b, 1);
      this.captureGfx.lineBetween(this.player.x, this.player.y + wob, npc.x, npc.y - wob);
      // Anneaux de corde qui s'accumulent sur le suspect
      const loops = Math.floor((this.tying.progress / CAPTURE_TIME) * 5);
      this.captureGfx.lineStyle(2, 0x8a5a2b, 1);
      for (let i = 0; i < loops; i++) {
        this.captureGfx.strokeEllipse(npc.x, npc.y - 6 + i * 5, 26, 7);
      }

      // Barre de progression
      const ratio = Math.min(1, this.tying.progress / CAPTURE_TIME);
      const x = npc.x - 32, y = npc.y - 48;
      this.captureGfx.fillStyle(0x2c3a1e, 0.9);
      this.captureGfx.fillRoundedRect(x, y, 64, 11, 4);
      this.captureGfx.fillStyle(0xffe08a);
      this.captureGfx.fillRoundedRect(x + 2, y + 2, Math.max(4, 60 * ratio), 7, 3);

      this.capturePrompt.setPosition(npc.x, npc.y - 62)
        .setText(`Ligotage... ${Math.ceil((CAPTURE_TIME - this.tying.progress) / 1000)}s`)
        .setVisible(true);

      if (this.tying.progress >= CAPTURE_TIME) this.finishTying();
      return;
    }

    // --- Fouet armé, pas de prise : clic = coup de fouet directionnel ---
    if (this.whipArmed) {
      this.capturePrompt.setPosition(this.player.x, this.player.y - 50)
        .setText('FOUET ARMÉ').setVisible(true);
      if (pointer.isDown) this.whipLash(time);
    } else {
      this.capturePrompt.setVisible(false);
    }

    // Animation du coup de fouet (extension rapide puis disparition)
    if (this.whipAnim) {
      const t = (time - this.whipAnim.start) / 180; // 180 ms d'animation
      if (t >= 1) { this.whipAnim = null; }
      else {
        const len = this.whipAnim.hit * Math.sin(t * Math.PI); // sort et revient
        this.captureGfx.lineStyle(3, 0x8a5a2b, 1 - t * 0.4);
        this.captureGfx.lineBetween(
          this.player.x, this.player.y,
          this.player.x + Math.cos(this.whipAnim.angle) * len,
          this.player.y + Math.sin(this.whipAnim.angle) * len
        );
      }
    }
  }

  // Le fouet part en ligne droite et attrape le premier SUSPECT sur sa trajectoire
  whipLash(time) {
    if (time < this.whipCooldownUntil) return;
    this.whipCooldownUntil = time + WHIP_COOLDOWN;
    this.sfx('whip');

    const angle = this.gun.rotation;
    const x1 = this.player.x, y1 = this.player.y;
    const line = new Phaser.Geom.Line(
      x1, y1,
      x1 + Math.cos(angle) * WHIP_RANGE,
      y1 + Math.sin(angle) * WHIP_RANGE
    );

    let best = null, bestT = Infinity;
    this.npcs.children.iterate((n) => {
      if (!n || !n.active || !n.body.enable) return;
      // Le fouet attrape le PREMIER PNJ sur sa trajectoire, quel qu'il soit :
      // à toi de viser proprement à travers la foule
      const circle = new Phaser.Geom.Circle(n.x, n.y, 18);
      if (Phaser.Geom.Intersects.LineToCircle(line, circle)) {
        // Distance le long de la trajectoire : on prend le plus proche
        const t = (n.x - x1) * Math.cos(angle) + (n.y - y1) * Math.sin(angle);
        if (t > 0 && t < bestT) { bestT = t; best = n; }
      }
    });

    this.whipAnim = { start: time, angle, hit: best ? bestT : WHIP_RANGE };
    if (best) this.startTying(best);
  }

  startTying(npc) {
    this.tying = { npc, progress: 0 };
    npc.setVelocity(0, 0);
    npc.nextThink = Number.MAX_SAFE_INTEGER; // le suspect est maîtrisé

    // Mauvaise prise : ce PNJ est déjà hors de cause. On te prévient
    // tout de suite — relâche le clic pour ne pas perdre 10 s (et le malus).
    if (this.isExcluded(npc)) {
      const t = this.add.text(npc.x, npc.y - 60, 'Déjà hors de cause !', {
        fontFamily: 'Arial Black, sans-serif', fontSize: '15px',
        color: '#e0a03a', stroke: '#2c3a1e', strokeThickness: 4
      }).setOrigin(0.5).setDepth(9602);
      this.tweens.add({ targets: t, y: t.y - 35, alpha: 0, duration: 1200, onComplete: () => t.destroy() });
    }
  }

  cancelTying(reason) {
    if (!this.tying) return;
    const npc = this.tying.npc;
    if (npc.active) npc.nextThink = this.time.now; // il reprend sa vie
    this.tying = null;
    this.capturePrompt.setVisible(false);
    if (reason) {
      const t = this.add.text(this.player.x, this.player.y - 50, reason, {
        fontFamily: 'Arial Black, sans-serif', fontSize: '16px',
        color: '#e04a3a', stroke: '#2c3a1e', strokeThickness: 4
      }).setOrigin(0.5).setDepth(9602);
      this.tweens.add({ targets: t, y: t.y - 40, alpha: 0, duration: 900, onComplete: () => t.destroy() });
    }
  }

  finishTying() {
    const npc = this.tying.npc;
    this.tying = null;
    this.capturePrompt.setVisible(false);

    if (npc.isCulprit) {
      this.score += SCORE_CULPRIT;
      this.floatScore(npc.x, npc.y, SCORE_CULPRIT);
      this.endScreen(true, 'COUPABLE CAPTURÉ !');
      return;
    }

    // Mauvais suspect : -100 + panique
    this.sfx('wrong');
    const malus = SCORE_WRONG_TIE;
    this.score += malus;
    this.floatScore(npc.x, npc.y, malus);
    this.cameras.main.shake(200, 0.006);

    const t = this.add.text(npc.x, npc.y - 60, 'Ce n\'est pas lui !', {
      fontFamily: 'Arial Black, sans-serif', fontSize: '18px',
      color: '#e04a3a', stroke: '#2c3a1e', strokeThickness: 4
    }).setOrigin(0.5).setDepth(9602);
    this.tweens.add({ targets: t, y: t.y - 45, alpha: 0, duration: 1100, onComplete: () => t.destroy() });

    // Il s'enfuit à toutes jambes (et le fouet doit se réarmer)
    const angle = Phaser.Math.Angle.Between(this.player.x, this.player.y, npc.x, npc.y);
    npc.setVelocity(Math.cos(angle) * 170, Math.sin(angle) * 170);
    npc.nextThink = this.time.now + 2200;
    this.whipCooldownUntil = this.time.now + 1200;
    this.updateHud();
  }

  // Le coupable est abattu : la partie ne s'arrête PAS.
  // Le rôle est transféré à un « complice » — un suspect vivant compatible
  // avec tous les indices déjà révélés. Le tueur maladroit prend -100.
  culpritDown(npc, killerBot) {
    if (killerBot) killerBot.score += SCORE_WRONG_TIE;
    else {
      this.score += SCORE_WRONG_TIE;
      this.cameras.main.shake(250, 0.008);
    }
    this.floatScore(npc.x, npc.y, SCORE_WRONG_TIE);
    this.sfx('wrong');

    // Mort visuelle, sans autre scoring
    npc.isCulprit = false;
    this.killNpcSilent(npc);

    // Choix de l'héritier parmi les suspects vivants
    const candidates = [];
    this.npcs.children.iterate((n) => {
      if (!n || !n.active || !n.body.enable || n === npc) return;
      if (this.isExcluded(n)) return;
      candidates.push(n);
    });
    if (candidates.length === 0) {
      // Le dernier suspect vient d'être abattu : le cookie est perdu à jamais.
      // Amende massive au destructeur, et la partie se joue AU SCORE.
      if (killerBot) killerBot.score += SCORE_COOKIE_LOST;
      else this.score += SCORE_COOKIE_LOST;

      const standings = [
        { name: 'YOU', score: this.score },
        ...this.bots.map(b => ({ name: b.name, score: b.score }))
      ].sort((a, b) => b.score - a.score);
      const playerWins = standings[0].name === 'YOU';
      this.endScreen(
        playerWins,
        playerWins
          ? 'COOKIE PERDU — VICTOIRE AU SCORE !'
          : `COOKIE PERDU — ${standings[0].name.toUpperCase()} GAGNE AU SCORE`
      );
      return;
    }
    const heir = candidates[Math.floor(Math.random() * candidates.length)];
    heir.isCulprit = true;
    this.culpritAttrs = heir.attrs;
    this.rebuildCluePool();

    // Annonce à tous : la traque continue
    this.bannerTitle.setText('LE COUPABLE EST TOMBÉ !');
    this.bannerText.setText('Un complice a récupéré le cookie... la traque continue !');
    this.banner.setPosition(this.cameras.main.width / 2, -80);
    this.tweens.add({ targets: this.banner, y: 70, duration: 400, ease: 'Back.easeOut' });
    this.time.delayedCall(4000, () => {
      this.tweens.add({ targets: this.banner, y: -80, duration: 300, ease: 'Back.easeIn' });
    });
    this.updateHud();
  }

  // Recalcule les indices restants pour le NOUVEAU coupable, en gardant
  // valides tous les indices déjà révélés (l'héritier n'est pas exclu par eux).
  rebuildCluePool() {
    const remaining = Math.max(0, MAX_ROUNDS - this.revealedClues.length);
    const revealed = new Set(this.revealedClues.map(c => c.axis + ':' + c.value));
    const pool = [];
    for (const v of Object.keys(HAIR_COLORS)) if (v !== this.culpritAttrs.hair && !revealed.has('hair:' + v)) pool.push({ axis: 'hair', value: v });
    for (const v of HAIR_LENGTHS) if (v !== this.culpritAttrs.len && !revealed.has('len:' + v)) pool.push({ axis: 'len', value: v });
    for (const v of HATS) if (v !== this.culpritAttrs.hat && !revealed.has('hat:' + v)) pool.push({ axis: 'hat', value: v });
    for (const v of Object.keys(TOP_COLORS)) if (v !== this.culpritAttrs.top && !revealed.has('top:' + v)) pool.push({ axis: 'top', value: v });
    Phaser.Utils.Array.Shuffle(pool);
    this.cluePool = pool.slice(0, remaining);
  }

  // ---------- MANCHE : indice + resserrement de zone ----------
  startRound() {
    // Indice (s'il en reste)
    if (this.cluePool.length > 0) {
      const clue = this.cluePool.pop();
      this.revealedClues.push(clue);
      this.sfx('clue');
      const text = CLUE_TEXTS[clue.axis](clue.value);

      this.bannerText.setText(text);
      this.banner.setPosition(this.cameras.main.width / 2, -80);
      this.tweens.add({ targets: this.banner, y: 70, duration: 400, ease: 'Back.easeOut' });
      this.time.delayedCall(5000, () => {
        this.tweens.add({ targets: this.banner, y: -80, duration: 300, ease: 'Back.easeIn' });
      });

      const lines = this.revealedClues.map((c, i) => `${i + 1}. ${CLUE_TEXTS[c.axis](c.value)}`);
      this.hudClues.setText('INDICES\n' + lines.join('\n'));

      // Dernier indice révélé → la phase finale s'ouvre
      if (this.cluePool.length === 0) {
        this.finalPhase = true;
        // La bannière de phase finale attend que celle de l'indice reparte
        this.time.delayedCall(5600, () => this.showFinalBanner());
      }
    }

    // Resserrement : 4 paliers maximum, la zone 4 est la zone finale
    if (this.zonePhase < MAX_ROUNDS) {
      this.zonePhase++;
      this.zoneFrom = this.zoneR;
      this.zoneTo = Math.max(ZONE_MIN_R, this.zoneTo * ZONE_SHRINK_FACTOR);
      this.zoneShrinkStart = this.time.now;
    }
  }

  // ---------- MISE À JOUR DE LA ZONE ----------
  updateZone(delta) {
    // Interpolation du rayon pendant la rétraction
    if (this.zoneR > this.zoneTo) {
      const t = Phaser.Math.Clamp((this.time.now - this.zoneShrinkStart) / ZONE_SHRINK_MS, 0, 1);
      this.zoneR = Phaser.Math.Linear(this.zoneFrom, this.zoneTo, t);
    }

    // Dessin : anneau rouge + halo extérieur
    this.zoneGfx.clear();
    this.zoneGfx.lineStyle(44, 0xe04a3a, 0.12);
    this.zoneGfx.strokeCircle(CENTER, CENTER, this.zoneR + 22);
    this.zoneGfx.lineStyle(6, 0xe04a3a, 0.85);
    this.zoneGfx.strokeCircle(CENTER, CENTER, this.zoneR);

    // Dégâts au joueur hors zone (croissants avec les phases)
    const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, CENTER, CENTER);
    if (!this.playerDown && dist > this.zoneR) {
      const dps = 3 + this.zonePhase * 2.5;
      this.zoneDamageAcc += dps * delta / 1000;
      if (this.zoneDamageAcc >= 1) {
        const dmg = Math.floor(this.zoneDamageAcc);
        this.zoneDamageAcc -= dmg;
        this.damagePlayer(dmg);
      }
      // Vignette rouge pulsante tant qu'on est dehors
      this.dmgVignette.setAlpha(0.12 + 0.06 * Math.sin(this.time.now / 120));
    } else {
      this.dmgVignette.setAlpha(0);
    }
  }

  // ==================== BOTS ====================

  randomPointInZone(marginRatio = 0.7) {
    // La zone peut ne pas encore être initialisée (spawn des bots au boot) :
    // repli sur le rayon de départ. Sans ça, position NaN → corps physiques
    // corrompus → TOUT l'arbre de collisions casse (balles fantômes, etc.)
    const zoneR = this.zoneR || ZONE_START_R;
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * zoneR * marginRatio;
    return { x: CENTER + Math.cos(a) * r, y: CENTER + Math.sin(a) * r };
  }

  spawnBot(def) {
    // Au boot : point d'anneau attribué. Au respawn : aléatoire dans la zone.
    const p = this.spawnPoints && this.spawnPoints[this.bots.length + 1]
      ? this.spawnPoints[this.bots.length + 1]
      : this.randomPointInZone(0.85);
    const sprite = this.physics.add.sprite(p.x, p.y, 'player');
    sprite.setCircle(15, 2, 2);
    sprite.setCollideWorldBounds(true);
    this.botGroup.add(sprite);

    const bot = {
      name: def.name, hex: def.hex,
      sprite,
      hairImg: this.add.image(p.x, p.y - 5, 'hair_white').setTint(def.hair),
      gunImg: this.add.image(p.x, p.y, 'gun').setOrigin(0.1, 0.5),
      tagText: this.add.text(0, 0, def.name, {
        fontFamily: 'Arial Black, sans-serif', fontSize: '13px',
        color: def.color, stroke: '#2c3a1e', strokeThickness: 4
      }).setOrigin(0.5),
      hp: BOT_HP,
      score: 0,
      down: false, downUntil: 0,
      nextThink: 0, fireAt: 0,
      mode: 'wander', targetNpc: null,
      tieTarget: null, tieProgress: 0,
      rejected: new Set(),   // suspects déjà vérifiés (mauvaise pioche)
      zoneAcc: 0, aim: 0
    };
    sprite.botRef = bot;
    this.bots.push(bot);
    return bot;
  }

  damageBot(bot, dmg, fromPlayer) {
    if (!bot || bot.down || this.gameOver) return;
    bot.hp -= dmg;
    bot.tieProgress = 0; // tout dégât interrompt son ligotage
    bot.sprite.setTintFill(0xffffff);
    this.time.delayedCall(60, () => { if (!bot.down) bot.sprite.clearTint(); });
    if (bot.hp <= 0) this.downBot(bot, fromPlayer);
  }

  downBot(bot, fromPlayer) {
    bot.down = true;
    bot.downUntil = this.time.now + RESPAWN_MS;
    bot.hp = 0;
    bot.tieTarget = null; bot.tieProgress = 0;
    bot.sprite.setVelocity(0, 0);
    bot.sprite.body.enable = false;
    bot.sprite.setTint(0x9a9a9a).setAlpha(0.5).setAngle(90);
    bot.hairImg.setAlpha(0.35);
    bot.gunImg.setVisible(false);
    bot.tagText.setText(bot.name + ' (down)');
    this.sfx('down', 0.4 + this.volAt(bot.sprite.x, bot.sprite.y) * 0.6);

    // Drop d'équipement du bot : le PvP devient une source de loot
    const r = Math.random();
    const dropType = r < 0.45 ? 'rifle' : r < 0.7 ? 'medkit' : r < 0.9 ? 'shotgun' : 'rocket';
    this.spawnPickup(dropType, bot.sprite.x + (Math.random() - 0.5) * 50,
      bot.sprite.y + (Math.random() - 0.5) * 50, AMMO_PACK[dropType] || 1);

    if (fromPlayer) {
      this.score += SCORE_BOT;
      this.floatScore(bot.sprite.x, bot.sprite.y, SCORE_BOT);
    }
    const t = this.add.text(bot.sprite.x, bot.sprite.y - 55, `${bot.name} est down !`, {
      fontFamily: 'Arial Black, sans-serif', fontSize: '15px',
      color: '#ffe08a', stroke: '#2c3a1e', strokeThickness: 4
    }).setOrigin(0.5).setDepth(9602);
    this.tweens.add({ targets: t, y: t.y - 35, alpha: 0, duration: 1400, onComplete: () => t.destroy() });
    this.updateHud();
  }

  respawnBot(bot) {
    const p = this.randomPointInZone(0.8);
    bot.sprite.setPosition(p.x, p.y);
    bot.hp = BOT_HP;
    bot.down = false;
    bot.sprite.body.enable = true;
    bot.sprite.clearTint();
    bot.sprite.setAlpha(1).setAngle(0);
    bot.hairImg.setAlpha(1);
    bot.gunImg.setVisible(true);
    bot.tagText.setText(bot.name);
    bot.nextThink = 0;
    this.updateHud();
  }

  botFire(bot, angle, time, spread = 0.24, cosmetic = false, cd = BOT_FIRE_CD) {
    if (time < bot.fireAt) return false;
    bot.fireAt = time + cd + Math.random() * 150;
    this.sfx('rifle', this.volAt(bot.sprite.x, bot.sprite.y) * 0.7);
    const a = angle + (Math.random() - 0.5) * spread; // imprécision selon la cible
    const tipX = bot.sprite.x + Math.cos(a) * 30;
    const tipY = bot.sprite.y + Math.sin(a) * 30;
    const bullet = this.enemyBullets.get(tipX, tipY);
    if (!bullet) return true;
    bullet.enableBody(true, tipX, tipY, true, true);
    bullet.setCircle(5);
    bullet.setDepth(9000);
    bullet.setTint(0xffb36e); // teinte orangée : balles ennemies lisibles
    bullet.born = time;
    bullet.owner = bot; // pour attribuer les points du kill
    bullet.cosmetic = cosmetic; // TOUJOURS réassigné (pool recyclé !)
    this.physics.velocityFromRotation(a, BOT_BULLET_SPEED, bullet.body.velocity);
    const flash = this.add.image(tipX, tipY, 'flash').setBlendMode(Phaser.BlendModes.ADD).setDepth(9001);
    this.tweens.add({ targets: flash, alpha: 0, scale: 1.4, duration: 60, onComplete: () => flash.destroy() });
    this.scareNpcs(tipX, tipY, 170);
    return true;
  }

  // Purge "facile" : le kill est résolu directement, la balle n'est que du visuel.
  // Facteur d'erreur : parfois la rafale touche le voisin (malus si suspect).
  botPurgeShot(bot, npc, time) {
    const ang = Phaser.Math.Angle.Between(bot.sprite.x, bot.sprite.y, npc.x, npc.y);
    if (!this.botFire(bot, ang, time, 0.06, true, BOT_PURGE_CD)) return;

    let target = npc;
    if (Math.random() < BOT_PURGE_MISTAKE) {
      let best = null, bestD = 90;
      this.npcs.children.iterate((n) => {
        if (!n || !n.active || !n.body.enable || n === npc) return;
        const d = Phaser.Math.Distance.Between(npc.x, npc.y, n.x, n.y);
        if (d < bestD) { bestD = d; best = n; }
      });
      if (best) target = best;
    }
    if (Math.random() > BOT_PURGE_HIT) return; // raté propre

    // Impact différé le temps que la balle "arrive" (cohérence visuelle)
    const flightMs = Phaser.Math.Distance.Between(bot.sprite.x, bot.sprite.y, target.x, target.y)
      / BOT_BULLET_SPEED * 1000;
    this.time.delayedCall(flightMs, () => {
      if (target.active && target.body.enable) this.applyBotShotOnNpc(bot, target);
    });
  }

  applyBotShotOnNpc(bot, npc) {
    const hitAngle = Phaser.Math.Angle.Between(bot.sprite.x, bot.sprite.y, npc.x, npc.y);
    npc.lastHitAngle = hitAngle;
    this.bloodSplat(npc.x, npc.y, hitAngle);
    npc.hp -= BOT_BULLET_DMG;
    npc.setTintFill(0xffffff);
    this.time.delayedCall(60, () => { if (npc.active) npc.clearTint(); });
    if (npc.hp <= 0) {
      if (npc.isCulprit) { this.culpritDown(npc, bot); return; }
      bot.score += this.isExcluded(npc) ? SCORE_GOOD : this.currentMalus();
      this.killNpcSilent(npc);
    }
  }

  nearestSuspect(x, y, rejected) {
    let best = null, bestD = Infinity;
    this.npcs.children.iterate((n) => {
      if (!n || !n.active || !n.body.enable) return;
      if (this.isExcluded(n) || rejected.has(n)) return;
      if (this.tying && this.tying.npc === n) return; // déjà pris par le joueur
      const d = Phaser.Math.Distance.Between(x, y, n.x, n.y);
      if (d < bestD) { bestD = d; best = n; }
    });
    return best;
  }

  nearestExcluded(x, y, maxDist) {
    let best = null, bestD = maxDist;
    this.npcs.children.iterate((n) => {
      if (!n || !n.active || !n.body.enable) return;
      if (!this.isExcluded(n)) return;
      const d = Phaser.Math.Distance.Between(x, y, n.x, n.y);
      if (d < bestD) { bestD = d; best = n; }
    });
    return best;
  }

  // IA des bots : priorités = combat > migration > capture > purge > errance
  thinkBot(bot, time) {
    if (time < bot.nextThink) return;
    bot.nextThink = time + 220 + Math.random() * 120;

    const s = bot.sprite;
    const dCenter = Phaser.Math.Distance.Between(s.x, s.y, CENTER, CENTER);
    const dPlayer = Phaser.Math.Distance.Between(s.x, s.y, this.player.x, this.player.y);

    // 1. Le joueur est à portée → combat (approche / recul / strafe)
    if (!this.playerDown && dPlayer < BOT_VIEW) {
      bot.mode = 'fight';
      let ang = Phaser.Math.Angle.Between(s.x, s.y, this.player.x, this.player.y);
      if (dPlayer < 150) ang += Math.PI;
      else if (dPlayer <= 260) ang += (Math.random() < 0.5 ? 1 : -1) * Math.PI / 2;
      s.setVelocity(Math.cos(ang) * BOT_SPEED, Math.sin(ang) * BOT_SPEED);
      return;
    }

    // 2. Hors zone → migrer vers le centre
    if (dCenter > this.zoneR * 0.92) {
      bot.mode = 'migrate';
      const ang = Phaser.Math.Angle.Between(s.x, s.y, CENTER, CENTER) + (Math.random() - 0.5) * 0.6;
      s.setVelocity(Math.cos(ang) * BOT_SPEED, Math.sin(ang) * BOT_SPEED);
      return;
    }

    // 3. Phase finale → aller capturer un suspect
    if (this.finalPhase) {
      bot.mode = 'capture';
      const invalid = !bot.tieTarget || !bot.tieTarget.active || !bot.tieTarget.body.enable
        || bot.rejected.has(bot.tieTarget) || (this.tying && this.tying.npc === bot.tieTarget);
      if (invalid) {
        // Erreur de lecture : parfois le bot confond les attributs et cible
        // un PNJ en réalité déjà exclu → ligotage voué au -100 (comme un humain)
        if (Math.random() < BOT_TIE_ERROR) {
          bot.tieTarget = this.nearestExcluded(s.x, s.y, 600) || this.nearestSuspect(s.x, s.y, bot.rejected);
        } else {
          bot.tieTarget = this.nearestSuspect(s.x, s.y, bot.rejected);
        }
        bot.tieProgress = 0;
      }
      if (bot.tieTarget) {
        const d = Phaser.Math.Distance.Between(s.x, s.y, bot.tieTarget.x, bot.tieTarget.y);
        if (d > 46) {
          const ang = Phaser.Math.Angle.Between(s.x, s.y, bot.tieTarget.x, bot.tieTarget.y);
          s.setVelocity(Math.cos(ang) * BOT_SPEED, Math.sin(ang) * BOT_SPEED);
        } else s.setVelocity(0, 0);
      } else s.setVelocity(0, 0);
      return;
    }

    // 4. Purge des PNJ exclus (les bots suivent les indices... en se trompant parfois)
    const tgtInvalid = !bot.targetNpc || !bot.targetNpc.active || !bot.targetNpc.body.enable
      || Phaser.Math.Distance.Between(s.x, s.y, bot.targetNpc.x, bot.targetNpc.y) > 900;
    if (tgtInvalid) {
      bot.targetNpc = this.nearestExcluded(s.x, s.y, 800);
      // Erreur d'identification : "je te jure qu'il avait une casquette !"
      // Le bot verrouille un suspect voisin par erreur et le purgera (malus).
      if (bot.targetNpc && Math.random() < BOT_TARGET_ERROR) {
        const wrong = this.nearestSuspect(bot.targetNpc.x, bot.targetNpc.y, bot.rejected);
        if (wrong && Phaser.Math.Distance.Between(bot.targetNpc.x, bot.targetNpc.y, wrong.x, wrong.y) < 250) {
          bot.targetNpc = wrong;
        }
      }
    }
    if (bot.targetNpc) {
      bot.mode = 'purge';
      const d = Phaser.Math.Distance.Between(s.x, s.y, bot.targetNpc.x, bot.targetNpc.y);
      if (d > 150) {
        // On s'approche franchement : de près, on ne rate pas
        const ang = Phaser.Math.Angle.Between(s.x, s.y, bot.targetNpc.x, bot.targetNpc.y);
        s.setVelocity(Math.cos(ang) * BOT_SPEED * 0.9, Math.sin(ang) * BOT_SPEED * 0.9);
      } else s.setVelocity(0, 0);
      return;
    }

    // 5. Errance
    // 5. Exploration : patrouiller vers un point lointain de la zone
    // (au lieu de piétiner sur place — c'est comme ça qu'on trouve des cibles)
    bot.mode = 'wander';
    if (!bot.roamTarget ||
        Phaser.Math.Distance.Between(s.x, s.y, bot.roamTarget.x, bot.roamTarget.y) < 80) {
      bot.roamTarget = this.randomPointInZone(0.85);
    }
    const rang = Phaser.Math.Angle.Between(s.x, s.y, bot.roamTarget.x, bot.roamTarget.y);
    s.setVelocity(Math.cos(rang) * BOT_SPEED * 0.7, Math.sin(rang) * BOT_SPEED * 0.7);
  }

  updateBots(time, delta) {
    this.botGfx.clear();
    for (const bot of this.bots) {
      const s = bot.sprite;

      // --- Down : attendre le respawn ---
      if (bot.down) {
        s.setDepth(s.y);
        bot.tagText.setPosition(s.x, s.y - 32).setDepth(s.y + 3);
        if (time >= bot.downUntil) this.respawnBot(bot);
        continue;
      }

      this.thinkBot(bot, time);

      // --- Dégâts de zone (les bots aussi) ---
      const dCenter = Phaser.Math.Distance.Between(s.x, s.y, CENTER, CENTER);
      if (dCenter > this.zoneR) {
        const dps = 3 + this.zonePhase * 2.5;
        bot.zoneAcc += dps * delta / 1000;
        if (bot.zoneAcc >= 1) {
          const dmg = Math.floor(bot.zoneAcc);
          bot.zoneAcc -= dmg;
          this.damageBot(bot, dmg, false); // pas de points pour la zone
          if (bot.down) continue;
        }
      }

      // --- Visée & tir ---
      let aimTarget = null;
      if (bot.mode === 'fight' && !this.playerDown) aimTarget = this.player;
      else if (bot.mode === 'purge' && bot.targetNpc && bot.targetNpc.active) aimTarget = bot.targetNpc;

      if (aimTarget) {
        bot.aim = Phaser.Math.Angle.Between(s.x, s.y, aimTarget.x, aimTarget.y);
        const d = Phaser.Math.Distance.Between(s.x, s.y, aimTarget.x, aimTarget.y);
        if (bot.mode === 'fight') {
          if (d < 420) this.botFire(bot, bot.aim, time, 0.22); // joueur mobile : vraies balles
        } else if (d < 260) {
          this.botPurgeShot(bot, aimTarget, time); // PNJ : résolution directe, facile
        }
      } else if (s.body.velocity.length() > 5) {
        bot.aim = Math.atan2(s.body.velocity.y, s.body.velocity.x);
      }

      // --- Ligotage par le bot (phase finale) ---
      if (bot.mode === 'capture' && bot.tieTarget && bot.tieTarget.active && bot.tieTarget.body.enable) {
        const npc = bot.tieTarget;
        const d = Phaser.Math.Distance.Between(s.x, s.y, npc.x, npc.y);
        if (d < 60) {
          s.setVelocity(0, 0);
          npc.setVelocity(0, 0);
          npc.nextThink = time + 400;
          bot.tieProgress += delta;
          // Corde + barre de progression aux couleurs du bot
          this.botGfx.lineStyle(3, 0x8a5a2b, 1);
          this.botGfx.lineBetween(s.x, s.y, npc.x, npc.y);
          const r = Math.min(1, bot.tieProgress / CAPTURE_TIME);
          this.botGfx.fillStyle(0x2c3a1e, 0.9);
          this.botGfx.fillRoundedRect(npc.x - 32, npc.y - 48, 64, 11, 4);
          this.botGfx.fillStyle(bot.hex);
          this.botGfx.fillRoundedRect(npc.x - 30, npc.y - 46, Math.max(4, 60 * r), 7, 3);
          if (bot.tieProgress >= CAPTURE_TIME) this.resolveBotTie(bot, npc);
        }
      }

      // --- Rendu : accessoires, barre de vie, profondeur ---
      s.setDepth(s.y);
      s.scaleY = s.body.speed > 5 ? 1 + Math.sin(time / 55 + s.x * 0.1) * 0.06 : 1;
      bot.gunImg.setPosition(s.x, s.y + 2).setRotation(bot.aim)
        .setDepth(s.y + (Math.sin(bot.aim) < 0 ? -1 : 1));
      bot.hairImg.setPosition(s.x, s.y - 5).setDepth(s.y + 2);
      bot.tagText.setPosition(s.x, s.y - 34).setDepth(s.y + 3);

      const ratio = Math.max(0, bot.hp / BOT_HP);
      this.botGfx.fillStyle(0x2c3a1e, 0.85);
      this.botGfx.fillRect(s.x - 16, s.y - 25, 32, 5);
      this.botGfx.fillStyle(bot.hex);
      this.botGfx.fillRect(s.x - 15, s.y - 24, 30 * ratio, 3);
    }
  }

  resolveBotTie(bot, npc) {
    if (npc.isCulprit) {
      this.endScreen(false, `${bot.name.toUpperCase()} A CAPTURÉ LE COUPABLE !`);
      return;
    }
    // Mauvaise pioche : -100 pour le bot aussi, il raye le suspect et repart
    bot.score += SCORE_WRONG_TIE;
    this.floatScore(npc.x, npc.y, SCORE_WRONG_TIE);
    bot.rejected.add(npc);
    bot.tieTarget = null;
    bot.tieProgress = 0;
    const ang = Phaser.Math.Angle.Between(bot.sprite.x, bot.sprite.y, npc.x, npc.y);
    npc.setVelocity(Math.cos(ang) * 170, Math.sin(ang) * 170);
    npc.nextThink = this.time.now + 2200;
  }

  // Balle de bot sur un PNJ : score pour le bot, transfert si c'était le coupable
  hitNpcByBot(bullet, npc) {
    const owner = bullet.owner;
    if (bullet.cosmetic) { this.killBullet(bullet); return; } // purge : déjà résolu
    const hitAngle = Math.atan2(bullet.body.velocity.y, bullet.body.velocity.x);
    this.killBullet(bullet);
    npc.lastHitAngle = hitAngle;
    this.bloodSplat(npc.x, npc.y, hitAngle);
    npc.hp--;
    npc.setTintFill(0xffffff);
    this.time.delayedCall(60, () => { if (npc.active) npc.clearTint(); });
    if (npc.hp <= 0) {
      if (npc.isCulprit) { this.culpritDown(npc, owner); return; }
      // Mêmes règles que le joueur : +10 sur un exclu, malus sur un suspect
      if (owner) {
        owner.score += this.isExcluded(npc) ? SCORE_GOOD : this.currentMalus();
      }
      this.killNpcSilent(npc);
    }
  }

  killNpcSilent(npc) {
    npc.body.enable = false;
    this.sfx('pop', 0.3 + this.volAt(npc.x, npc.y) * 0.7);
    this.bloodPool(npc.x, npc.y, npc.lastHitAngle);
    this.witnessReaction(npc.x, npc.y);
    this.npcAlive--;
    for (let i = 0; i < 4; i++) {
      const p = this.add.image(npc.x + (Math.random() - 0.5) * 20, npc.y + (Math.random() - 0.5) * 20, 'puff')
        .setDepth(npc.y + 1).setAlpha(0.9);
      this.tweens.add({ targets: p, alpha: 0, scale: 2, y: p.y - 15, duration: 350, onComplete: () => p.destroy() });
    }
    this.spawnCorpse(npc);
    this.updateHud();
  }

  // ==================== DOWN / RESPAWN DU JOUEUR ====================

  downPlayer(attacker) {
    if (this.playerDown) return;
    if (this.tying) this.cancelTying();
    this.playerDown = true;
    this.playerRespawnAt = this.time.now + RESPAWN_MS;
    this.lastKiller = attacker ? attacker.name : 'la zone';
    this.sfx('down');
    if (attacker) attacker.score += SCORE_BOT;
    this.whipArmed = false;
    this.player.setVelocity(0, 0);
    this.player.body.enable = false;
    this.player.setAlpha(0.45).setAngle(90);
    this.hair.setAlpha(0.35);
    this.gun.setVisible(false);
    this.tag.setText('YOU (down)');
    this.capturePrompt.setVisible(false);
    this.dropPlayerEquipment(); // on lâche tout son équipement au sol
    this.downOverlay.setAlpha(0.35);
    this.downText.setVisible(true);
    this.cameras.main.shake(250, 0.008);
  }

  respawnPlayer() {
    const p = this.randomPointInZone(0.6);
    this.player.setPosition(p.x, p.y);
    this.player.hp = PLAYER_MAX_HP;
    this.playerDown = false;
    this.player.body.enable = true;
    this.player.setAlpha(1).setAngle(0);
    this.hair.setAlpha(1);
    this.gun.setVisible(true).setTexture(this.weaponGunTexture(this.currentWeapon));
    this.tag.setText('YOU');
    this.downOverlay.setAlpha(0);
    this.downText.setVisible(false);
  }

  updatePlayerDown() {
    const w = this.cameras.main.width, h = this.cameras.main.height;
    this.downOverlay.setSize(w, h);
    const secs = Math.max(0, Math.ceil((this.playerRespawnAt - this.time.now) / 1000));
    this.downText.setPosition(w / 2, h / 2).setText(`ÉLIMINÉ par ${this.lastKiller} !\nRespawn dans ${secs}s`);
    if (this.time.now >= this.playerRespawnAt) this.respawnPlayer();
  }

  damagePlayer(amount, attacker) {
    if (this.gameOver) return;
    if (this.tying) this.cancelTying('Interrompu !');
    if (this.healing) this.healing = null; // le soin est interrompu par les dégâts
    this.sfx('hurt', 0.8);
    this.player.hp -= amount;
    if (this.player.hp <= 0) {
      this.player.hp = 0;
      this.downPlayer(attacker);
    }
  }

  floatScore(x, y, amount) {
    const good = amount > 0;
    const t = this.add.text(x, y - 20, (good ? '+' : '') + amount, {
      fontFamily: 'Arial Black, sans-serif', fontSize: good ? '18px' : '22px',
      color: good ? '#7dd94a' : '#e04a3a', stroke: '#2c3a1e', strokeThickness: 4
    }).setOrigin(0.5).setDepth(9500);
    this.tweens.add({ targets: t, y: y - 60, alpha: 0, duration: 800, onComplete: () => t.destroy() });
  }

  hitNpc(bullet, npc) {
    if (this.gameOver) return;
    if (bullet.explosive) {
      const bx = bullet.x, by = bullet.y;
      this.killBullet(bullet);
      this.explodeAt(bx, by); // l'explosion gère tous les dégâts de zone
      return;
    }
    const dmg = bullet.dmg || 12;
    const hitAngle = Math.atan2(bullet.body.velocity.y, bullet.body.velocity.x);
    this.killBullet(bullet);
    npc.lastHitAngle = hitAngle;
    this.bloodSplat(npc.x, npc.y, hitAngle);
    npc.hp -= dmg;
    npc.setTintFill(0xffffff);
    this.time.delayedCall(60, () => { if (npc.active) npc.clearTint(); });
    if (npc.hp <= 0) {
      if (npc.isCulprit) this.culpritDown(npc, null);
      else this.killNpc(npc);
    }
  }

  killNpc(npc) {
    npc.body.enable = false;
    this.sfx('pop', 0.3 + this.volAt(npc.x, npc.y) * 0.7);
    this.bloodPool(npc.x, npc.y, npc.lastHitAngle);
    this.witnessReaction(npc.x, npc.y);
    this.npcAlive--;
    this.kills++;

    if (this.isExcluded(npc)) {
      this.score += SCORE_GOOD;
      this.floatScore(npc.x, npc.y, SCORE_GOOD);
    } else {
      const malus = this.currentMalus();
      this.score += malus;
      this.floatScore(npc.x, npc.y, malus);
      // Secousse proportionnelle à la gravité de l'erreur
      this.cameras.main.shake(120 + this.revealedClues.length * 40, 0.004 + this.revealedClues.length * 0.001);
    }
    this.updateHud();

    for (let i = 0; i < 5; i++) {
      const p = this.add.image(npc.x + (Math.random() - 0.5) * 20, npc.y + (Math.random() - 0.5) * 20, 'puff')
        .setDepth(npc.y + 1).setAlpha(0.9);
      this.tweens.add({ targets: p, alpha: 0, scale: 2, y: p.y - 15, duration: 350, onComplete: () => p.destroy() });
    }
    this.spawnCorpse(npc);
  }

  defeat() { this.endScreen(false, 'LA ZONE T\'A EU...'); }

  endScreen(victory, title) {
    this.gameOver = true;
    this.sfx(victory ? 'win' : 'lose');
    this.physics.pause();
    this.capturePrompt.setVisible(false);
    this.captureGfx.clear();
    this.botGfx.clear();
    this.downText.setVisible(false);
    this.downOverlay.setAlpha(0);

    const w = this.cameras.main.width, h = this.cameras.main.height;
    this.add.rectangle(w / 2, h / 2, w, h, 0x2c3a1e, 0.75).setScrollFactor(0).setDepth(20000);
    this.add.text(w / 2, h / 2 - 60, title, {
      fontFamily: 'Arial Black, sans-serif', fontSize: '42px',
      color: victory ? '#ffe08a' : '#e04a3a',
      stroke: '#4a3b2a', strokeThickness: 8
    }).setOrigin(0.5).setScrollFactor(0).setDepth(20001);
    this.add.text(w / 2, h / 2 + 5, `Score final : ${this.score}   •   Éliminations : ${this.kills}`, {
      fontFamily: 'Arial, sans-serif', fontSize: '22px', color: '#f3ead8'

  updateHud() {
    const secs = Math.max(0, Math.ceil((this.nextClueAt - this.time.now) / 1000));
    const shrinking = this.zoneR > this.zoneTo + 1;
    let zoneInfo;
    if (this.finalPhase) zoneInfo = 'PHASE FINALE — Capturez le coupable !';
    else if (shrinking) zoneInfo = '⚠ LA ZONE SE RESSERRE !';
    else zoneInfo = `Prochaine manche : ${secs}s`;
    const botsUp = this.bots.filter(b => !b.down).length;
    const bareme = this.finalPhase
      ? `Capture : +${SCORE_CULPRIT}   Ligotage raté : ${SCORE_WRONG_TIE}   Down : +${SCORE_BOT}`
      : `Bon PNJ : +${SCORE_GOOD}   Down : +${SCORE_BOT}   Erreur : ${this.currentMalus()}`;
    this.hudStats.setText(
      `SCORE : ${this.score}\nPNJ : ${this.npcAlive}  |  Éliminations : ${this.kills}  |  Bots : ${botsUp}/${BOT_DEFS.length}\nManche ${Math.min(this.zonePhase + 1, MAX_ROUNDS)}/${MAX_ROUNDS}  —  ${zoneInfo}\n${bareme}`
    );
  }

  drawLeaderboard() {
    const w = this.cameras.main.width;
    const panelW = 195, lineH = 21, pad = 16;

    const entries = [

  drawMinimap() {
    const w = this.cameras.main.width;
    const size = 130, pad = 16;
    const mx = w - size - pad, my = pad;
    const g = this.minimapGfx;
    g.clear();
    // Cadre arrondi sombre
    g.fillStyle(0x2c2620, 0.85); g.fillRoundedRect(mx, my, size, size, 18);
    g.lineStyle(3, 0x4a3b2a, 1); g.strokeRoundedRect(mx, my, size, size, 18);
    const scale = size / WORLD;
    // Cercle de zone
    g.lineStyle(2, 0xe04a3a, 0.9);
    g.strokeCircle(mx + CENTER * scale, my + CENTER * scale, this.zoneR * scale);
    // Joueur
    g.fillStyle(0x7dd94a);
    g.fillCircle(mx + this.player.x * scale, my + this.player.y * scale, 4);
    // Bots (gris quand down)
    for (const bot of this.bots) {
      g.fillStyle(bot.down ? 0x777777 : bot.hex);
      g.fillCircle(mx + bot.sprite.x * scale, my + bot.sprite.y * scale, 3.5);
    }
  }

  killBullet(bullet) { bullet.disableBody(true, true); }

  // ==================== AUDIO (Web Audio, 100% procédural) ====================

  getAudioCtx() {
    if (!this.game.sfxCtx) {
      try { this.game.sfxCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { return null; }
    }
    if (this.game.sfxCtx.state === 'suspended') this.game.sfxCtx.resume();
    return this.game.sfxCtx;
  }

  tone(freqA, freqB, dur, type, vol) {
    const ctx = this.getAudioCtx(); if (!ctx || vol <= 0.005) return;
    const t = ctx.currentTime;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freqA, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(1, freqB), t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(t); o.stop(t + dur);
  }

  noise(dur, vol, cutoff) {
    const ctx = this.getAudioCtx(); if (!ctx || vol <= 0.005) return;
    const len = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = cutoff;
    const g = ctx.createGain(); g.gain.value = vol;
    src.connect(f); f.connect(g); g.connect(ctx.destination);
    src.start(ctx.currentTime);
  }

  // Atténuation par la distance au joueur (les sons lointains sont discrets)
  volAt(x, y) {
    const d = Phaser.Math.Distance.Between(this.player.x, this.player.y, x, y);
    return Phaser.Math.Clamp(1 - d / 900, 0, 1);
  }

  sfx(name, vol = 1) {
    switch (name) {
      case 'pistol':   this.tone(240, 70, 0.09, 'square', 0.12 * vol); break;
      case 'rifle':    this.tone(190, 60, 0.06, 'square', 0.10 * vol); break;
      case 'shotgun':  this.noise(0.18, 0.30 * vol, 900); this.tone(120, 40, 0.15, 'square', 0.10 * vol); break;
      case 'rocket':   this.tone(110, 30, 0.35, 'sawtooth', 0.16 * vol); this.noise(0.3, 0.10 * vol, 500); break;
      case 'explosion':this.noise(0.5, 0.5 * vol, 400); this.tone(90, 25, 0.5, 'sine', 0.35 * vol); break;
      case 'pop':      this.tone(320, 90, 0.12, 'sine', 0.18 * vol); break;
      case 'hurt':     this.tone(160, 90, 0.08, 'triangle', 0.20 * vol); break;
      case 'pickup':   this.tone(660, 660, 0.06, 'sine', 0.15 * vol);
                       setTimeout(() => this.tone(990, 990, 0.08, 'sine', 0.15 * vol), 70); break;
      case 'clue':     [523, 659, 784].forEach((f, i) => setTimeout(() => this.tone(f, f, 0.14, 'triangle', 0.16 * vol), i * 110)); break;
      case 'wrong':    this.tone(220, 80, 0.35, 'sawtooth', 0.18 * vol); break;
      case 'down':     this.noise(0.35, 0.30 * vol, 300); this.tone(100, 35, 0.4, 'sine', 0.30 * vol); break;
      case 'heal':     this.tone(330, 660, 0.25, 'sine', 0.15 * vol); break;
      case 'whip':     this.noise(0.09, 0.20 * vol, 3500); break;
      case 'win':      [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => this.tone(f, f, 0.18, 'triangle', 0.20 * vol), i * 130)); break;
      case 'lose':     [392, 311, 233].forEach((f, i) => setTimeout(() => this.tone(f, f, 0.25, 'triangle', 0.20 * vol), i * 160)); break;
    }
  }

  // ==================== PANIQUE & SANG ====================

  // Un coup de feu fait fuir les PNJ alentour dans la direction opposée.
  // Effet tactique : tirer disperse la foule (y compris tes futures cibles).
  scareNpcs(x, y, radius) {
    const now = this.time.now;
    this.npcs.children.iterate((n) => {
      if (!n || !n.active || !n.body.enable) return;
      if (n.nextThink > now + 5000) return; // ligoté = maîtrisé, il ne fuit pas
      const d = Phaser.Math.Distance.Between(x, y, n.x, n.y);
      if (d > radius) return;
      const ang = Phaser.Math.Angle.Between(x, y, n.x, n.y) + (Math.random() - 0.5) * 0.5;
      const speed = 130 + Math.random() * 50;
      n.setVelocity(Math.cos(ang) * speed, Math.sin(ang) * speed);
      n.nextThink = now + 800 + Math.random() * 700;
    });
  }

  // Gouttes projetées dans la direction de l'impact (+ taches persistantes)
  bloodSplat(x, y, dirAngle, count = 14) {
    for (let i = 0; i < count; i++) {
      const a = dirAngle + (Math.random() - 0.5) * 0.9; // cône serré dans l'axe du tir
      const dist = 12 + Math.random() * 52;
      const lx = x + Math.cos(a) * dist;
      const ly = y + Math.sin(a) * dist + 6;
      const d = this.add.image(x, y, 'blood_drop')
        .setDepth(y + 5).setScale(0.5 + Math.random() * 1.0).setAlpha(0.95);
      this.tweens.add({
        targets: d,
        x: lx, y: ly,
        alpha: 0, scale: 0.3,
        duration: 200 + Math.random() * 200,
        onComplete: () => d.destroy()
      });
      // Une bonne partie des gouttes tache le sol durablement au point de chute
      if (Math.random() < 0.55) {
        this.add.image(lx, ly, 'blood_drop')
          .setDepth(-5).setScale(0.4 + Math.random() * 0.6)
          .setAlpha(0.4 + Math.random() * 0.25);
      }
    }
  }

  // Nuée de gouttelettes persistantes autour d'un point (accompagne les flaques)
  bloodDroplets(x, y, dirAngle, count) {
    for (let i = 0; i < count; i++) {
      // Si un axe est fourni, les gouttes suivent majoritairement le tir
      const a = (dirAngle !== undefined && dirAngle !== null && Math.random() < 0.7)
        ? dirAngle + (Math.random() - 0.5) * 1.1
        : Math.random() * Math.PI * 2;
      const d = 12 + Math.random() * 55;
      this.add.image(x + Math.cos(a) * d, y + 8 + Math.sin(a) * d, 'blood_drop')
        .setDepth(-5).setScale(0.35 + Math.random() * 0.7)
        .setAlpha(0.35 + Math.random() * 0.3);
    }
  }

  // Flaque persistante. Deux styles mélangés pour casser la répétition :
  // ~45% : tache ronde classique (avec quelques points satellites)
  // sinon : flaque GICLÉE dans l'axe du tir (allongée, décalée, éclaboussure)
  bloodPool(x, y, dirAngle) {
    if (dirAngle === undefined || dirAngle === null || Math.random() < 0.45) {
      const p = this.add.image(x + (Math.random() - 0.5) * 8, y + 8, 'blood_pool')
        .setDepth(-5).setRotation(Math.random() * Math.PI * 2)
        .setScale(0.35).setAlpha(0.75 + Math.random() * 0.2);
      this.tweens.add({ targets: p, scale: 0.85 + Math.random() * 0.35, duration: 380, ease: 'Quad.easeOut' });
      // Nuée de gouttelettes tout autour de la tache
      this.bloodDroplets(x, y, null, 7 + Math.floor(Math.random() * 5));
      return;
    }

    const a = dirAngle + (Math.random() - 0.5) * 0.3;

    // Flaque principale, projetée et étirée dans l'axe
    const px = x + Math.cos(a) * 16;
    const py = y + 8 + Math.sin(a) * 16;
    const p = this.add.image(px, py, 'blood_pool')
      .setDepth(-5).setRotation(a)
      .setScale(0.4, 0.3)
      .setAlpha(0.8 + Math.random() * 0.15);
    this.tweens.add({
      targets: p,
      scaleX: 1.1 + Math.random() * 0.5, // étirement le long du tir
      scaleY: 0.7 + Math.random() * 0.25,
      duration: 380, ease: 'Quad.easeOut'
    });

    // Éclaboussure secondaire, plus loin dans l'axe (60% du temps)
    if (Math.random() < 0.6) {
      const sx = x + Math.cos(a) * (40 + Math.random() * 20);
      const sy = y + 8 + Math.sin(a) * (40 + Math.random() * 20);
      const s = this.add.image(sx, sy, 'blood_pool')
        .setDepth(-5).setRotation(a + (Math.random() - 0.5) * 0.6)
        .setScale(0.2).setAlpha(0.6 + Math.random() * 0.15);
      this.tweens.add({ targets: s, scale: 0.45 + Math.random() * 0.2, duration: 420, ease: 'Quad.easeOut' });
    }
    // Nuée de gouttelettes le long de l'axe du tir
    this.bloodDroplets(x, y, a, 8 + Math.floor(Math.random() * 6));
  }

  // Le cadavre reste au sol : couché, légèrement éteint, sous les vivants
  spawnCorpse(npc) {
    const corpse = this.add.image(npc.x, npc.y + 2, npc.texture.key)
      .setDepth(-4) // au-dessus des flaques (-5), sous tous les personnages
      .setAlpha(0.95)
      .setTint(0xbbb3a8); // teint éteint : lisiblement "mort", attributs encore visibles
    const finalAngle = (Math.random() < 0.5 ? 90 : -90) + (Math.random() - 0.5) * 24;
    this.tweens.add({
      targets: corpse, angle: finalAngle, y: corpse.y + 8,
      duration: 180, ease: 'Quad.easeIn'
    });
    npc.destroy();
  }

  // ==================== TÉMOINS ("?!") ====================
  // Les PNJ proches d'une élimination s'affolent et détalent.
  witnessReaction(x, y) {
    let shown = 0;
    this.npcs.children.iterate((n) => {
      if (shown >= 3 || !n || !n.active || !n.body.enable) return;
      const d = Phaser.Math.Distance.Between(x, y, n.x, n.y);
      if (d < 30 || d > 150 || Math.random() < 0.5) return;
      shown++;
      const t = this.add.text(n.x, n.y - 42, '?!', {
        fontFamily: 'Arial Black, sans-serif', fontSize: '15px',
        color: '#4a3b2a', backgroundColor: '#f3ead8', padding: { x: 5, y: 2 }
      }).setOrigin(0.5).setDepth(9601);
      this.tweens.add({ targets: t, y: t.y - 18, alpha: 0, duration: 1000, onComplete: () => t.destroy() });
      const ang = Phaser.Math.Angle.Between(x, y, n.x, n.y);
      n.setVelocity(Math.cos(ang) * 130, Math.sin(ang) * 130);
      n.nextThink = this.time.now + 900;
    });
  }
