  startGame() {
    this.titleMode = false;
    this.physics.resume();
    this.nextClueAt = this.time.now + CLUE_INTERVAL;
    this.time.delayedCall(600, () => {
      if (this.gameOver) return;
      this.bannerTitle.setText('PHASE DE LOOT !');
      this.bannerText.setText('Équipez-vous — premier indice dans 30 s');
      this.banner.setPosition(this.cameras.main.width / 2, -80);
      this.tweens.add({ targets: this.banner, y: 70, duration: 400, ease: 'Back.easeOut' });
      this.time.delayedCall(4000, () => {
        this.tweens.add({ targets: this.banner, y: -80, duration: 300, ease: 'Back.easeIn' });
        this.bannerTitle.setText('NOUVEL INDICE !');
      });
    });
  }

  shoot(time) {
    const w = WEAPONS[this.currentWeapon];
    if (time - this.lastShot < w.cd) return;
    // Munitions
    if (!w.infinite) {
      if (this.ammo[this.currentWeapon] <= 0) { this.selectWeapon('pistol'); return; }
      this.ammo[this.currentWeapon]--;
    }
    this.lastShot = time;
    this.sfx(this.currentWeapon);
    if (this.currentWeapon === 'shotgun') this.cameras.main.shake(70, 0.003);
    if (this.currentWeapon === 'rocket') this.cameras.main.shake(90, 0.004);
    const baseAngle = this.gun.rotation;
    const tipX = this.gun.x + Math.cos(baseAngle) * 30;
    const tipY = this.gun.y + Math.sin(baseAngle) * 30;

    for (let i = 0; i < w.pellets; i++) {
      const angle = baseAngle + (Math.random() - 0.5) * w.spread;
      const bullet = this.bullets.get(tipX, tipY);
      if (!bullet) break;
      bullet.enableBody(true, tipX, tipY, true, true);
      bullet.setCircle(5);
      bullet.setDepth(9000);
      bullet.born = time;
      bullet.life = w.life;
      bullet.dmg = w.dmg;
      bullet.explosive = !!w.explosive;
      bullet.setScale(w.explosive ? 1.6 : 1);
      bullet.setTint(w.explosive ? 0xff8a5a : 0xffffff);
      this.physics.velocityFromRotation(angle, w.speed, bullet.body.velocity);
    }

    const flash = this.add.image(tipX, tipY, 'flash').setBlendMode(Phaser.BlendModes.ADD).setDepth(9001);
    this.tweens.add({ targets: flash, alpha: 0, scale: 1.6, duration: 70, onComplete: () => flash.destroy() });
    this.scareNpcs(tipX, tipY, 170); // le coup de feu disperse la foule
    // À sec après ce tir → retour pistolet automatique
    if (!w.infinite && this.ammo[this.currentWeapon] <= 0) this.selectWeapon('pistol');
  }

  // ==================== LOOT & INVENTAIRE ====================

  weaponGunTexture(key) {
    return { pistol: 'gun_pistol', rifle: 'gun', shotgun: 'gun_shotgun', rocket: 'gun_rocket' }[key];
  }

  selectWeapon(key) {
    if (!this.owned[key]) return;
    this.currentWeapon = key;
    if (!this.whipArmed && !this.playerDown) this.gun.setTexture(this.weaponGunTexture(key));
  }

  spawnInitialLoot() {
    const spots = [];
    // 40% au centre (le hot drop), le reste dispersé
    for (const [type, count] of Object.entries(LOOT_COUNTS)) {
      for (let i = 0; i < count; i++) {
        let x, y;
        if (Math.random() < 0.4) {
          const a = Math.random() * Math.PI * 2, r = 80 + Math.random() * 320;
          x = CENTER + Math.cos(a) * r; y = CENTER + Math.sin(a) * r;
        } else {
          x = 150 + Math.random() * (WORLD - 300);
          y = 150 + Math.random() * (WORLD - 300);
        }
        spots.push({ type, x, y });
      }
    }
    for (const s of spots) this.spawnPickup(s.type, s.x, s.y, AMMO_PACK[s.type] || 1);
  }

  spawnPickup(type, x, y, amount) {
    const item = this.loot.create(x, y, 'loot_' + type);
    item.lootType = type;
    item.amount = amount;
    item.body.setAllowGravity(false);
    item.setDepth(y - 30);
    this.tweens.add({ targets: item, y: y - 6, duration: 800, yoyo: true, repeat: -1, ease: 'Sine.inOut' });
    return item;
  }

  pickupLoot(item) {
    if (this.playerDown || this.gameOver || !item.active) return;
    const type = item.lootType;
    let label;
    if (type === 'medkit') {
      if (this.medkits >= MEDKIT_MAX) return; // plein : on laisse la caisse au sol
      this.medkits++;
      label = '+1 medkit [R]';
    } else {
      const first = !this.owned[type];
      this.owned[type] = true;
      this.ammo[type] += item.amount;
      label = first ? `${WEAPONS[type].name} ! [${WEAPONS[type].key}]` : `+${item.amount} ${WEAPONS[type].name.toLowerCase()}`;
      if (first) this.selectWeapon(type); // équiper direct à la première prise
    }
    this.sfx('pickup');
    const t = this.add.text(item.x, item.y - 24, label, {
      fontFamily: 'Arial Black, sans-serif', fontSize: '14px',
      color: '#ffe08a', stroke: '#2c3a1e', strokeThickness: 4
    }).setOrigin(0.5).setDepth(9602);
    this.tweens.add({ targets: t, y: t.y - 30, alpha: 0, duration: 900, onComplete: () => t.destroy() });
    item.destroy();
  }

  // À la mort : on lâche tout son équipement (sauf le pistolet)
  dropPlayerEquipment() {
    const spread = () => (Math.random() - 0.5) * 70;
    for (const type of ['rifle', 'shotgun', 'rocket']) {
      if (this.owned[type] && this.ammo[type] > 0) {
        this.spawnPickup(type, this.player.x + spread(), this.player.y + spread(), this.ammo[type]);
      }
      this.owned[type] = false;
      this.ammo[type] = 0;
    }
    for (let i = 0; i < this.medkits; i++) {
      this.spawnPickup('medkit', this.player.x + spread(), this.player.y + spread(), 1);
    }
    this.medkits = 0;
    this.currentWeapon = 'pistol';
    this.healing = null;
  }

  // ==================== EXPLOSION (roquette) ====================

  explodeAt(x, y) {
    this.sfx('explosion', 0.4 + this.volAt(x, y) * 0.6);
    this.scareNpcs(x, y, 300);
    const radius = WEAPONS.rocket.radius;
    const dmg = WEAPONS.rocket.dmg;

    // Visuel
    const boom = this.add.circle(x, y, radius, 0xffb36e, 0.55).setDepth(9400).setBlendMode(Phaser.BlendModes.ADD);
    const core = this.add.circle(x, y, radius * 0.4, 0xfff2b0, 0.9).setDepth(9401).setBlendMode(Phaser.BlendModes.ADD);
    this.tweens.add({ targets: [boom, core], alpha: 0, scale: 1.5, duration: 260, onComplete: () => { boom.destroy(); core.destroy(); } });
    this.cameras.main.shake(160, 0.006);

    // Dégâts de zone : PNJ (scoring normal, transfert si coupable)
    const victims = [];
    this.npcs.children.iterate((n) => {
      if (!n || !n.active || !n.body.enable) return;
      if (Phaser.Math.Distance.Between(x, y, n.x, n.y) <= radius) victims.push(n);
    });
    for (const n of victims) {
      n.lastHitAngle = Phaser.Math.Angle.Between(x, y, n.x, n.y);
      this.bloodSplat(n.x, n.y, n.lastHitAngle, 20);
      n.hp -= dmg;
      if (n.hp <= 0) {
        if (n.isCulprit) this.culpritDown(n, null);
        else this.killNpc(n);
      }
    }
    // Bots (interrompt leurs ligotages via damageBot)
    for (const bot of this.bots) {
      if (bot.down) continue;
      if (Phaser.Math.Distance.Between(x, y, bot.sprite.x, bot.sprite.y) <= radius) {
        this.damageBot(bot, dmg, true);
      }
    }
  }

  // ==================== SOIN (medkit, touche R) ====================

  startHeal() {
    if (this.medkits <= 0 || this.player.hp >= PLAYER_MAX_HP) return;
    if (this.tying || this.healing) return;
    this.healing = { until: this.time.now + HEAL_TIME };
  }

  updateHeal() {
    this.healGfx = this.healGfx || this.add.graphics().setDepth(9600);
    this.healGfx.clear();
    if (!this.healing) return;
    if (this.playerDown) { this.healing = null; return; }
    const remain = this.healing.until - this.time.now;
    if (remain <= 0) {
      this.medkits--;
      this.player.hp = Math.min(PLAYER_MAX_HP, this.player.hp + MEDKIT_HEAL);
      this.healing = null;
      this.sfx('heal');
      this.floatScore(this.player.x, this.player.y, MEDKIT_HEAL); // +50 vert
      return;
    }
    // Barre de canalisation au-dessus du joueur
    const ratio = 1 - remain / HEAL_TIME;
    this.healGfx.fillStyle(0x2c3a1e, 0.9);
    this.healGfx.fillRoundedRect(this.player.x - 26, this.player.y - 46, 52, 9, 4);
    this.healGfx.fillStyle(0x7dd94a);
    this.healGfx.fillRoundedRect(this.player.x - 24, this.player.y - 44, Math.max(4, 48 * ratio), 5, 3);
  }

  // ==================== HOTBAR ====================

  drawHotbar() {
    const w = this.cameras.main.width, h = this.cameras.main.height;
    const slotW = 74, slotH = 56, gap = 8;
    const defs = [
      { key: 'pistol', label: '1', icon: 'loot_pistol' },
      { key: 'rifle', label: '2', icon: 'loot_rifle' },
      { key: 'shotgun', label: '3', icon: 'loot_shotgun' },
      { key: 'rocket', label: '4', icon: 'loot_rocket' },
      { key: 'medkit', label: 'R', icon: 'loot_medkit' }
    ];
    const totalW = defs.length * slotW + (defs.length - 1) * gap;
    const x0 = w / 2 - totalW / 2, y0 = h - slotH - 14;

    // Icônes créées une fois
    if (this.hotbarIcons.length === 0) {
      for (const d of defs) {
        this.hotbarIcons.push(this.add.image(0, 0, d.icon).setScrollFactor(0).setDepth(10001).setScale(0.85));
      }
    }

    this.hotbarGfx.clear();
    defs.forEach((d, i) => {
      const x = x0 + i * (slotW + gap);
      const isWeapon = d.key !== 'medkit';
      const ownedItem = isWeapon ? this.owned[d.key] : this.medkits > 0;
      const selected = isWeapon && this.currentWeapon === d.key && !this.whipArmed;

      this.hotbarGfx.fillStyle(0xf3ead8, ownedItem ? 0.95 : 0.35);
      this.hotbarGfx.fillRoundedRect(x, y0, slotW, slotH, 10);
      this.hotbarGfx.lineStyle(selected ? 4 : 2, selected ? 0xe0a03a : 0x4a3b2a, 1);
      this.hotbarGfx.strokeRoundedRect(x, y0, slotW, slotH, 10);

      this.hotbarIcons[i].setPosition(x + slotW / 2, y0 + 24).setAlpha(ownedItem ? 1 : 0.3);

      const count = d.key === 'pistol' ? '∞'
        : d.key === 'medkit' ? String(this.medkits)
        : String(this.ammo[d.key]);
      this.hotbarTexts[i * 2].setPosition(x + 6, y0 + 3).setText(d.label);
      this.hotbarTexts[i * 2 + 1].setPosition(x + slotW - 8, y0 + slotH - 18)
        .setOrigin(1, 0).setText(ownedItem ? count : '');
    });
  }

  // ---------- IA PNJ : errance, ou migration si hors zone ----------
  thinkNpc(npc, time) {
    if (time < npc.nextThink) return;

    const dist = Phaser.Math.Distance.Between(npc.x, npc.y, CENTER, CENTER);
    if (dist > this.zoneR * 0.92) {
      // Hors zone (ou presque) : cap vers le centre, d'un pas pressé,
      // avec un peu de dispersion pour éviter la colonne de fourmis
      const angle = Phaser.Math.Angle.Between(npc.x, npc.y, CENTER, CENTER)
        + (Math.random() - 0.5) * 0.9;
      const speed = 75 + Math.random() * 40;
      npc.setVelocity(Math.cos(angle) * speed, Math.sin(angle) * speed);
      npc.nextThink = time + 600 + Math.random() * 900;
      return;
    }

    if (Math.random() < 0.45) {
      npc.setVelocity(0, 0);
      npc.nextThink = time + 500 + Math.random() * 1800;
    } else {
      const angle = Math.random() * Math.PI * 2;
      const speed = 40 + Math.random() * 45;
      npc.setVelocity(Math.cos(angle) * speed, Math.sin(angle) * speed);
      npc.nextThink = time + 800 + Math.random() * 2200;
    }
  }

  update(time, delta) {
    if (this.titleMode) return;
    if (this.gameOver) return;

    if (this.playerDown) {
      // Joueur au sol : plus de contrôles, compte à rebours de respawn
      this.player.setVelocity(0, 0);
      this.player.setDepth(this.player.y);
      this.tag.setPosition(this.player.x, this.player.y - 32).setDepth(this.player.y + 3);
      this.updatePlayerDown();
    } else {
      const k = this.keys;
      let dx = 0, dy = 0;
      if (k.Z.isDown || k.W.isDown || k.UP.isDown) dy -= 1;
      if (k.S.isDown || k.DOWN.isDown) dy += 1;
      if (k.Q.isDown || k.A.isDown || k.LEFT.isDown) dx -= 1;
      if (k.D.isDown || k.RIGHT.isDown) dx += 1;
      // Ralenti à 50% pendant la canalisation d'un medkit
      const speed = this.healing ? PLAYER_SPEED * 0.5 : PLAYER_SPEED;
      const v = new Phaser.Math.Vector2(dx, dy).normalize().scale(speed);
      // Pendant un ligotage : immobile, arme rangée — vulnérable
      if (this.tying) this.player.setVelocity(0, 0);
      else this.player.setVelocity(v.x, v.y);

      // Changement d'arme (1-4) et soin (R)
      const wk = this.weaponKeys;
      if (Phaser.Input.Keyboard.JustDown(wk.ONE)) this.selectWeapon('pistol');
      if (Phaser.Input.Keyboard.JustDown(wk.TWO)) this.selectWeapon('rifle');
      if (Phaser.Input.Keyboard.JustDown(wk.THREE)) this.selectWeapon('shotgun');
      if (Phaser.Input.Keyboard.JustDown(wk.FOUR)) this.selectWeapon('rocket');
      if (Phaser.Input.Keyboard.JustDown(wk.R)) this.startHeal();

      const pointer = this.input.activePointer;
      const worldPoint = pointer.positionToCamera(this.cameras.main);
      const aim = Phaser.Math.Angle.Between(this.player.x, this.player.y, worldPoint.x, worldPoint.y);

      this.player.setDepth(this.player.y);
      this.gun.setPosition(this.player.x, this.player.y + 2).setRotation(aim)
        .setDepth(this.player.y + (Math.sin(aim) < 0 ? -1 : 1));
      this.hair.setPosition(this.player.x, this.player.y - 5).setDepth(this.player.y + 2);
      this.tag.setPosition(this.player.x, this.player.y - 32).setDepth(this.player.y + 3);

      if (pointer.isDown && !this.tying && !this.whipArmed) this.shoot(time);
    }

    this.bullets.children.iterate((b) => {
      if (b && b.active && time - b.born > (b.life || BULLET_LIFE)) {
        if (b.explosive) { const bx = b.x, by = b.y; this.killBullet(b); this.explodeAt(bx, by); }
        else this.killBullet(b);
      }
    });
    this.enemyBullets.children.iterate((b) => {
      if (b && b.active && time - b.born > BULLET_LIFE) this.killBullet(b);
    });

    // Traînées de balles
    this.trailGfx.clear();
    const drawTrail = (b, color) => {
      if (!b || !b.active) return;
      const v = b.body.velocity;
      const n = Math.hypot(v.x, v.y) || 1;
      const len = b.explosive ? 34 : 20;
      this.trailGfx.lineStyle(b.explosive ? 4 : 2, color, 0.35);
      this.trailGfx.lineBetween(b.x, b.y, b.x - v.x / n * len, b.y - v.y / n * len);
    };
    this.bullets.children.iterate(b => drawTrail(b, 0xfff2b0));
    this.enemyBullets.children.iterate(b => drawTrail(b, 0xffb36e));

    // Petit bobbing de marche du joueur
    if (!this.playerDown) {
      this.player.scaleY = this.player.body.speed > 5 ? 1 + Math.sin(time / 55) * 0.06 : 1;
    }

    this.npcs.children.iterate((npc) => {
      if (!npc || !npc.active || !npc.body.enable) return;
      this.thinkNpc(npc, time);
      npc.setDepth(npc.y);
      npc.scaleY = npc.body.speed > 5 ? 1 + Math.sin(time / 55 + npc.x * 0.1) * 0.06 : 1;
    });

    // Manches (indice + resserrement)
    if (this.time.now >= this.nextClueAt) {
      this.startRound();
      this.nextClueAt = this.time.now + CLUE_INTERVAL;
    }

    // Vignette plein écran suit la taille de la fenêtre
    this.dmgVignette.setSize(this.cameras.main.width, this.cameras.main.height);

    this.updateBots(time, delta);
    this.updateCapture(time, delta);
    this.updateHeal();
    this.updateZone(delta);
    this.updateHud();
    this.drawHpBar();
    this.drawMinimap();
    this.drawLeaderboard();
    this.drawHotbar();
  }
}

const config = {
  type: Phaser.AUTO,
  backgroundColor: '#6f8a4f',
  scale: { mode: Phaser.Scale.RESIZE, width: window.innerWidth, height: window.innerHeight },
  physics: { default: 'arcade', arcade: { debug: false } },
  scene: MainScene
};

new Phaser.Game(config);
</script>
